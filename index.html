<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeyaFlow — Brand Growth Intelligence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0E0E0E;
    --navy: #1E3A5F;
    --gold: #C4A882;
    --cream: #F7F5F0;
    --border: #EDE9E1;
    --muted: #9A9489;
    --green: #10B981;
    --amber: #F59E0B;
    --red: #EF4444;
    --blue: #1E40AF;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
    --mono: 'DM Mono', monospace;
  }

  html, body { height: 100%; background: var(--cream); font-family: var(--sans); color: var(--ink); }

  /* SHELL */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  #sidebar {
    width: 220px; min-width: 220px; background: var(--navy);
    display: flex; flex-direction: column; overflow: hidden;
    transition: width .25s;
  }
  .s-logo { padding: 1.5rem 1.25rem 1rem; border-bottom: 1px solid rgba(255,255,255,.08); }
  .s-logo-text { font-family: var(--serif); font-size: 1.25rem; color: #fff; font-weight: 400; }
  .s-logo-sub { font-family: var(--mono); font-size: .55rem; color: rgba(255,255,255,.3); letter-spacing: .12em; text-transform: uppercase; margin-top: .2rem; }

  .brand-pill {
    margin: .75rem; padding: .6rem .75rem;
    background: rgba(196,168,130,.1); border: 1px solid rgba(196,168,130,.2);
    cursor: pointer; display: none;
  }
  .brand-pill.visible { display: block; }
  .brand-pill-name { font-size: .72rem; color: var(--gold); font-weight: 500; }
  .brand-pill-sub { font-family: var(--mono); font-size: .55rem; color: rgba(255,255,255,.35); margin-top: .15rem; }

  .s-nav { padding: .75rem 0; flex: 1; overflow-y: auto; }
  .nav-item {
    display: flex; align-items: center; gap: .75rem;
    padding: .65rem 1.25rem; cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .15s;
  }
  .nav-item:hover { background: rgba(196,168,130,.08); }
  .nav-item.active { background: rgba(196,168,130,.15); border-left-color: var(--gold); }
  .nav-icon { font-size: .85rem; width: 18px; text-align: center; color: rgba(255,255,255,.4); }
  .nav-item.active .nav-icon { color: var(--gold); }
  .nav-label { font-size: .72rem; color: rgba(255,255,255,.45); letter-spacing: .04em; }
  .nav-item.active .nav-label { color: var(--gold); }
  .nav-badge { font-family: var(--mono); font-size: .5rem; background: var(--red); color: #fff; border-radius: 8px; padding: 1px 5px; margin-left: auto; }

  .s-footer { padding: .85rem 1.25rem; border-top: 1px solid rgba(255,255,255,.08); }
  .s-footer-text { font-family: var(--mono); font-size: .55rem; color: rgba(255,255,255,.25); }

  /* MAIN */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 1.1rem 2rem; display: flex; align-items: center;
    justify-content: space-between; gap: 1rem; flex-shrink: 0;
  }
  .page-title { font-family: var(--serif); font-size: 1.35rem; color: var(--navy); font-weight: 400; }
  .page-sub { font-family: var(--mono); font-size: .58rem; color: var(--muted); margin-top: .2rem; letter-spacing: .04em; }

  .content { flex: 1; overflow-y: auto; padding: 1.75rem 2rem; }

  /* REG STRIP */
  .reg-strip {
    background: #FEF3C7; border-bottom: 1px solid #FDE68A;
    padding: .45rem 2rem; display: flex; gap: 1rem; align-items: center;
    flex-wrap: wrap; flex-shrink: 0;
  }
  .reg-strip-label { font-family: var(--mono); font-size: .55rem; color: #92400E; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
  .reg-item { display: flex; align-items: center; gap: .4rem; }
  .reg-days { font-family: var(--mono); font-size: .6rem; font-weight: 700; }
  .reg-name { font-family: var(--sans); font-size: .62rem; color: #78350F; }
  .reg-btn { font-family: var(--mono); font-size: .5rem; padding: .15rem .45rem; background: none; border: 1px solid #D97706; color: #92400E; cursor: pointer; }

  /* CARDS */
  .card {
    background: #fff; border: 1px solid var(--border); padding: 1.25rem 1.5rem;
    margin-bottom: .85rem; box-shadow: 0 1px 4px rgba(0,0,0,.03);
  }
  .card-sm { padding: .85rem 1rem; }

  /* GRID HELPERS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; }
  .col-2 { display: grid; grid-template-columns: 360px 1fr; gap: 1.5rem; align-items: start; }
  .col-filter { display: grid; grid-template-columns: 300px 1fr; gap: 1.5rem; align-items: start; }

  /* STAT CARDS */
  .stat-card { background: #fff; border: 1px solid var(--border); padding: 1rem 1.25rem; border-top: 3px solid currentColor; }
  .stat-num { font-family: var(--serif); font-size: 2rem; line-height: 1; }
  .stat-label { font-family: var(--mono); font-size: .6rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-top: .3rem; }

  /* FORMS */
  .field { margin-bottom: 1rem; }
  label.lbl { display: block; font-family: var(--mono); font-size: .62rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #333; margin-bottom: .35rem; }
  input[type=text], input[type=number], input[type=email], select, textarea {
    width: 100%; padding: .7rem .9rem; border: 1px solid #DDD;
    background: var(--cream); font-family: var(--sans); font-size: .9rem;
    color: var(--ink); outline: none; appearance: none; resize: vertical;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--navy); }

  /* BUTTONS */
  .btn-primary {
    padding: .8rem 1.5rem; background: var(--navy); border: none; color: #fff;
    font-family: var(--mono); font-size: .7rem; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase; cursor: pointer;
    width: 100%; transition: opacity .15s;
  }
  .btn-primary:hover:not(:disabled) { opacity: .88; }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
  .btn-outline {
    padding: .5rem .9rem; background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: var(--mono); font-size: .62rem;
    letter-spacing: .06em; cursor: pointer;
  }
  .btn-outline:hover { border-color: var(--navy); color: var(--navy); }
  .btn-gold {
    padding: .6rem 1.2rem; background: var(--gold); border: none; color: #fff;
    font-family: var(--mono); font-size: .65rem; font-weight: 600;
    letter-spacing: .06em; cursor: pointer;
  }

  /* TAGS */
  .tag { font-family: var(--mono); font-size: .55rem; padding: .15rem .45rem; white-space: nowrap; }
  .tag-green { background: #ECFDF5; color: #065F46; }
  .tag-blue  { background: #EFF6FF; color: var(--blue); }
  .tag-amber { background: rgba(245,158,11,.1); color: #92400E; }
  .tag-red   { background: rgba(239,68,68,.08); color: #991B1B; }
  .tag-gray  { background: #F7F5F0; color: #6B6358; }
  .tag-purple{ background: #F5F3FF; color: #5B21B6; }

  /* PROGRESS BAR */
  .progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill  { height: 100%; border-radius: 3px; transition: width .4s; }

  /* SPINNER */
  .spinner {
    width: 32px; height: 32px; border: 2px solid var(--border);
    border-top-color: var(--navy); border-radius: 50%;
    animation: spin .9s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* PROSE */
  .prose { font-family: var(--sans); font-size: .83rem; color: #333; line-height: 1.85; }

  /* SECTION TAG */
  .section-tag { font-family: var(--mono); font-size: .58rem; letter-spacing: .15em; text-transform: uppercase; color: var(--gold); margin-bottom: .4rem; }

  /* ONBOARDING */
  .onboard-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; overflow-y: auto; }
  .onboard-inner { width: 100%; max-width: 520px; }
  .onboard-title { font-family: var(--serif); font-size: 1.4rem; color: var(--navy); margin-bottom: .35rem; }
  .onboard-sub { font-family: var(--sans); font-size: .8rem; color: var(--muted); margin-bottom: 1.25rem; }
  .stage-option {
    padding: .9rem 1rem; border: 1px solid var(--border); background: var(--cream);
    cursor: pointer; display: flex; gap: .85rem; align-items: center;
    margin-bottom: .5rem; transition: all .15s;
  }
  .stage-option.selected { border-color: var(--navy); background: #EFF6FF; }
  .stage-option-icon { font-size: 1rem; color: var(--muted); }
  .stage-option.selected .stage-option-icon { color: var(--navy); }
  .stage-option-name { font-family: var(--sans); font-size: .85rem; font-weight: 500; color: #333; }
  .stage-option.selected .stage-option-name { color: var(--navy); }
  .stage-option-desc { font-family: var(--sans); font-size: .7rem; color: var(--muted); margin-top: .1rem; }
  .market-chip {
    padding: .3rem .7rem; border: 1px solid var(--border); background: none;
    font-family: var(--mono); font-size: .62rem; color: var(--muted);
    cursor: pointer; transition: all .15s; display: inline-block; margin: .2rem;
  }
  .market-chip.selected { background: var(--navy); border-color: var(--navy); color: #fff; }
  .goal-chip {
    padding: .55rem .75rem; border: 1px solid var(--border); background: var(--cream);
    font-family: var(--sans); font-size: .72rem; color: #555;
    cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: .5rem;
  }
  .goal-chip.selected { border-color: var(--green); background: rgba(16,185,129,.07); color: #065F46; }
  .goal-chip-check { color: var(--border); }
  .goal-chip.selected .goal-chip-check { color: var(--green); }
  .cat-option {
    padding: .7rem .85rem; border: 1px solid var(--border); background: var(--cream);
    font-family: var(--sans); font-size: .8rem; color: #333;
    cursor: pointer; transition: all .15s;
  }
  .cat-option.selected { border-color: var(--navy); background: #EFF6FF; color: var(--navy); }

  /* DASHBOARD */
  .next-step-card {
    display: flex; gap: .75rem; align-items: center; padding: .75rem 1rem;
    background: #fff; border: 1px solid var(--border); cursor: pointer;
    transition: border-color .15s; margin-bottom: .5rem;
  }
  .next-step-card:hover { border-color: var(--navy); }
  .next-step-icon { color: var(--gold); font-size: .9rem; flex-shrink: 0; }
  .next-step-name { font-family: var(--sans); font-size: .82rem; color: var(--navy); font-weight: 500; }
  .next-step-desc { font-family: var(--sans); font-size: .68rem; color: var(--muted); margin-top: .1rem; }

  /* REPORT */
  .report-header { background: var(--navy); padding: 1.5rem 2rem; }
  .report-badge { font-family: var(--mono); font-size: .55rem; letter-spacing: .15em; text-transform: uppercase; color: var(--gold); margin-bottom: .4rem; }
  .report-brand { font-family: var(--serif); font-size: 1.6rem; color: #fff; font-weight: 400; margin-bottom: .2rem; }
  .report-meta { font-family: var(--sans); font-size: .7rem; color: rgba(255,255,255,.45); margin-bottom: 1rem; }
  .report-meta-row { display: flex; gap: 2rem; border-top: 1px solid rgba(255,255,255,.12); padding-top: .85rem; flex-wrap: wrap; }
  .report-meta-lbl { font-family: var(--mono); font-size: .52rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.3); margin-bottom: .2rem; }
  .report-meta-val { font-size: .82rem; color: #fff; }
  .report-section { border-bottom: 1px solid var(--border); padding: 1.5rem 1.5rem 1.5rem 1.25rem; }
  .report-section:last-child { border-bottom: none; }
  .report-section-num { font-family: var(--mono); font-size: .55rem; color: var(--gold); }
  .report-section-title { font-family: var(--serif); font-size: 1.05rem; color: var(--navy); margin: .2rem 0 .65rem; }

  /* SUPPLIERS */
  .supplier-row { border-bottom: 1px solid var(--border); padding: .85rem 0; }
  .risk-bar-track { height: 4px; background: var(--border); border-radius: 2px; margin-top: .25rem; overflow: hidden; }

  /* PITCH */
  .retailer-card {
    padding: .85rem 1rem; border: 1px solid var(--border); background: var(--cream);
    cursor: pointer; margin-bottom: .5rem; transition: all .15s;
  }
  .retailer-card.selected { border-color: var(--navy); background: #EFF6FF; }
  .email-box { font-family: var(--sans); font-size: .85rem; color: #333; line-height: 1.9; white-space: pre-wrap; background: var(--cream); border: 1px solid var(--border); padding: 1.25rem; }

  /* FIND */
  .mfr-card { background: #fff; border: 1px solid var(--border); border-left-width: 3px; padding: 1.1rem 1.25rem; margin-bottom: .75rem; }
  .compare-table { width: 100%; border-collapse: collapse; font-size: .78rem; }
  .compare-table th { padding: .75rem 1rem; text-align: left; background: var(--navy); color: rgba(255,255,255,.5); font-family: var(--mono); font-size: .58rem; letter-spacing: .08em; font-weight: normal; }
  .compare-table th.mfr-name { color: #fff; font-size: .78rem; font-family: var(--sans); font-weight: 500; }
  .compare-table td { padding: .6rem 1rem; vertical-align: top; border-bottom: 1px solid var(--border); }
  .compare-table tr:nth-child(even) td { background: var(--cream); }
  .compare-table td.row-label { font-family: var(--mono); font-size: .58rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }

  /* CIRCULAR */
  .espr-banner { padding: .6rem .85rem; margin-bottom: 1rem; }
  .espr-red  { background: #FEF2F2; border: 1px solid #FECACA; }
  .espr-amber{ background: #FFFBEB; border: 1px solid #FDE68A; }
  .espr-green{ background: #F0FDF4; border: 1px solid #BBF7D0; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 3rem 2rem; color: var(--muted); }
  .empty-title { font-family: var(--serif); font-size: 1.2rem; font-style: italic; color: var(--navy); margin-bottom: .5rem; }
  .empty-sub { font-family: var(--sans); font-size: .8rem; line-height: 1.7; max-width: 340px; margin: 0 auto; }

  /* SECTION HEADER in analysis */
  .analysis-section { margin-bottom: .75rem; padding-left: .75rem; border-left: 2px solid; }
  .analysis-label { font-family: var(--mono); font-size: .58rem; font-weight: 600; margin-bottom: .2rem; }
  .analysis-text { font-family: var(--sans); font-size: .78rem; color: #444; line-height: 1.7; }

  /* PAGE VISIBILITY */
  .page { display: none; flex-direction: column; height: 100%; }
  .page.active { display: flex; }

  /* PROGRESS BAR TOP */
  .progress-top { height: 3px; background: var(--border); flex-shrink: 0; }
  .progress-top-fill { height: 100%; background: var(--gold); transition: width .3s; }

  /* COMPARE TOGGLE */
  .compare-btn {
    padding: .3rem .6rem; font-family: var(--mono); font-size: .55rem;
    border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer;
    transition: all .15s;
  }
  .compare-btn.active { background: var(--navy); border-color: var(--navy); color: #fff; }

  /* CHIPS */
  .chips { display: flex; flex-wrap: wrap; gap: .3rem; }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  /* SAVED REPORT ROW */
  .saved-report {
    border: 1px solid var(--border); border-left: 3px solid var(--navy);
    padding: .85rem 1rem; margin-bottom: .5rem; cursor: pointer; background: #fff;
  }
  .saved-report-meta { font-family: var(--mono); font-size: .55rem; color: var(--gold); margin-bottom: .2rem; }
  .saved-report-name { font-size: .88rem; color: var(--navy); }
  .saved-report-date { font-family: var(--sans); font-size: .62rem; color: var(--muted); margin-top: .15rem; }

  /* PROFILE TABLE */
  .profile-row { display: grid; grid-template-columns: 120px 1fr; gap: .5rem; padding: .5rem 0; border-bottom: 1px solid #F0EDE8; }
  .profile-label { font-family: var(--mono); font-size: .58rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; align-self: center; }
  .profile-val { font-family: var(--sans); font-size: .8rem; color: #333; }

  /* NAV BANNER */
  .nav-banner {
    background: var(--navy); padding: 1rem 1.5rem;
    margin-bottom: 1.5rem; display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: .75rem;
  }
  .nav-banner-title { font-family: var(--serif); font-size: 1.05rem; color: #fff; }
  .nav-banner-sub { font-family: var(--mono); font-size: .55rem; color: var(--gold); margin-bottom: .3rem; }
  .nav-banner-btn {
    padding: .55rem .9rem; background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.2); color: #fff;
    font-family: var(--mono); font-size: .62rem; cursor: pointer; letter-spacing: .04em;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 680px) {
    #sidebar { display: none; }
    #app { flex-direction: column; }
    #main { flex: 1; min-height: 0; }

    .content { padding: 1rem; padding-bottom: 5rem; }
    .topbar { padding: .85rem 1rem; flex-wrap: wrap; gap: .5rem; }
    .page-title { font-size: 1.1rem; }

    /* Collapse all grids to single column */
    .grid-2, .grid-3, .grid-4, .col-2, .col-filter { grid-template-columns: 1fr !important; }

    /* Stats: 2 columns on mobile */
    .grid-4 { grid-template-columns: 1fr 1fr !important; gap: .5rem !important; }

    .card { padding: .85rem 1rem; }
    .nav-banner { padding: .85rem 1rem; flex-direction: column; align-items: flex-start; gap: .6rem; }
    .nav-banner-btn { font-size: .6rem; padding: .45rem .7rem; }
    .report-header { padding: 1rem; }
    .report-brand { font-size: 1.2rem; }
    .report-meta-row { gap: .85rem; }
    .onboard-wrap { padding: 1rem; align-items: flex-start; }
    .email-box { font-size: .8rem; }
    .compare-table { font-size: .7rem; }
    .compare-table th, .compare-table td { padding: .5rem .65rem; }

    /* Reg strip: horizontal scroll */
    .reg-strip { flex-wrap: nowrap; overflow-x: auto; gap: .85rem; padding: .4rem 1rem; }

    /* Jump nav: horizontal scroll */
    #section-jump { overflow-x: auto; flex-wrap: nowrap !important; }
  }

  /* MOBILE BOTTOM NAV */
  #mobile-nav {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--navy); border-top: 1px solid rgba(255,255,255,.1);
    z-index: 100; padding-bottom: env(safe-area-inset-bottom);
  }
  #mobile-nav-inner {
    display: flex; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #mobile-nav-inner::-webkit-scrollbar { display: none; }
  .mob-nav-item {
    display: flex; flex-direction: column; align-items: center;
    padding: .6rem .5rem .4rem; cursor: pointer; min-width: 60px;
    flex-shrink: 0; position: relative; transition: background .15s;
  }
  .mob-nav-item.active { background: rgba(196,168,130,.15); }
  .mob-nav-icon { font-size: .9rem; color: rgba(255,255,255,.4); }
  .mob-nav-item.active .mob-nav-icon { color: var(--gold); }
  .mob-nav-label { font-family: var(--mono); font-size: .48rem; color: rgba(255,255,255,.35); margin-top: .2rem; letter-spacing: .04em; white-space: nowrap; }
  .mob-nav-item.active .mob-nav-label { color: var(--gold); }
  .mob-badge { position: absolute; top: .35rem; right: .6rem; background: var(--red); color: #fff; border-radius: 8px; padding: 1px 4px; font-family: var(--mono); font-size: .42rem; }

  /* Mobile header */
  #mobile-header {
    display: none;
    background: var(--navy); padding: .75rem 1rem;
    flex-shrink: 0; align-items: center; justify-content: space-between;
  }
  .mob-header-title { font-family: var(--serif); font-size: 1rem; color: #fff; }
  .mob-header-sub { font-family: var(--mono); font-size: .52rem; color: rgba(255,255,255,.35); margin-top: .1rem; }
  .mob-header-brand { font-family: var(--mono); font-size: .58rem; color: var(--gold); text-align: right; cursor: pointer; }

  @media (max-width: 680px) {
    #mobile-nav { display: block; }
    #mobile-header { display: flex; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- MOBILE HEADER -->
  <div id="mobile-header">
    <div>
      <div class="mob-header-title">VeyaFlow</div>
      <div class="mob-header-sub">Brand Growth Intelligence</div>
    </div>
    <div class="mob-header-brand" id="mob-brand-label" onclick="showPage('home')">Set up →</div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="s-logo">
      <div class="s-logo-text">VeyaFlow</div>
      <div class="s-logo-sub">Brand Growth Intelligence</div>
    </div>

function calcRisk(s){
  let sc=0;
  sc+=Math.min(s.missing.length*1.2,6);
  if(s.eudrScope)sc+=2;
  const cr=COUNTRY_RISK[s.country]||"MEDIUM";
  if(cr==="HIGH")sc+=2; else if(cr==="MEDIUM")sc+=1;
  if(s.tier===3)sc+=1;
  if(s.status==="overdue")sc+=1;
  if((s.certifications||[]).length===0)sc+=0.5;
  if(s.auditOverdue)sc+=1;
  return Math.min(Math.round(sc*10)/10,10);
}

function calcSusScore(m){return Math.min(m.certifications.reduce((a,c)=>a+(CERT_SCORES[c]||0),0),20);}
function calcReadiness(m,market){
  if(!market||!MARKET_REQS[market])return null;
  const reqs=MARKET_REQS[market];
  const met=reqs.filter(r=>m.markets.includes(market)||m.certifications.some(c=>c.toLowerCase().includes(r.split(" ")[0].toLowerCase())));
  return Math.round((met.length/reqs.length)*100);
}

async function callAPI(messages,maxTokens=1200){
  let res;
  try{
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 24000); // 24s timeout
    res=await fetch("/.netlify/functions/anthropic-proxy",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:maxTokens,messages}),
      signal:controller.signal
    });
    clearTimeout(timeout);
  }catch(networkErr){
    if(networkErr.name==='AbortError') throw new Error("Request timed out after 24 seconds. Try again — the report generates in 4 steps and each step should complete within 10 seconds.");
    throw new Error("Connection error. Check your internet connection and try again.");
  }
  if(res.status===401)throw new Error("401 — API key missing. Deploy via Netlify proxy.");
  if(res.status===504)throw new Error("504 — Request timed out. Your Netlify plan may need upgrading, or try again in a moment.");
  if(res.status===529)throw new Error("529 — AI overloaded. Try again in a moment.");
  if(!res.ok)throw new Error("API error "+res.status);
  const d=await res.json();
  return(d.content||[]).map(b=>b.text||"").join("");
}

function daysUntil(d){return Math.max(0,Math.round((new Date(d)-new Date())/(1000*60*60*24)));}
function renderRegStrip(){
  const strip=document.getElementById('reg-strip');
  if(!brand){strip.style.display='none';return;}
  const relevant=REG_DEADLINES.filter(r=>!r.cat||r.cat.includes(brand.category)).slice(0,3);
  if(!relevant.length){strip.style.display='none';return;}
  strip.style.display='flex';
  strip.innerHTML=`<span class="reg-strip-label">⚠ Upcoming deadlines</span>`+
    relevant.map(r=>{
      const d=daysUntil(r.deadline);
      const color=d<90?'#EF4444':d<180?'#F59E0B':'#1E3A5F';
      return `<div class="reg-item"><span class="reg-days" style="color:${color}">${d}d</span><span class="reg-name">${r.title}</span><button class="reg-btn" onclick="showPage('${r.link}')">→</button></div>`;
    }).join('');
}

let onboardForm={name:'',website:'',category:'',currentMarket:'Sweden',targetMarkets:[],skus:'',stage:'trading',sustainabilityGoals:[],usp:'',userName:'',teamEmails:'',proofType:'revenue',annualRevenue:'',revenueGrowth:'',unitsSold:'',repeatRate:'',avgOrderValue:'',dtcRevenue:'',waitlistCount:'',socialFollowers:'',pressCount:'',awardsCount:'',reviewScore:'',wholesaleEnquiries:'',clinicalClaims:'',routineStep:'',basketImpact:''};

function renderHome(el){
  if(!brand){
    renderOnboard(el);
  } else {
    renderDashboard(el);
  }
}

function renderOnboard(el){
  const progress=(onboardStep/4)*100;
  el.innerHTML=`
    <div class="progress-top"><div class="progress-top-fill" style="width:${progress}%"></div></div>
    <div class="onboard-wrap">
      <div class="onboard-inner" id="onboard-inner"></div>
    </div>
  `;
  renderOnboardStep();
}

function renderOnboardStep(){
  const inner=document.getElementById('onboard-inner');
  if(!inner)return;
  if(onboardStep===1){
    inner.innerHTML=`
      <div class="onboard-title">Set up your brand workspace</div>
      <div class="onboard-sub">VeyaFlow uses this to personalise every report, manufacturer match, and retailer pitch to your brand, category, and target markets.</div>
      <div class="field"><label class="lbl">Brand name *</label><input type="text" id="ob-name" value="${onboardForm.name}" placeholder="e.g. Cloud & Glow" oninput="onboardForm.name=this.value"></div>
      <div class="field"><label class="lbl">Website</label><input type="text" id="ob-web" value="${onboardForm.website}" placeholder="e.g. cloudandglow.com" oninput="onboardForm.website=this.value"></div>
      <div class="field"><label class="lbl">Product category *</label>
        <div class="grid-2">${CATEGORIES.map(c=>`<div class="cat-option${onboardForm.category===c?' selected':''}" onclick="onboardForm.category='${c}';renderOnboardStep()">${c}</div>`).join('')}</div>
      </div>
      <div class="field"><label class="lbl">Brand positioning / USP</label><textarea id="ob-usp" placeholder="e.g. Premium Swedish skincare tools and overnight beauty rituals. Clean ingredients, clinically tested." oninput="onboardForm.usp=this.value">${onboardForm.usp}</textarea></div>
      <button class="btn-primary" onclick="onboardStep=2;renderPage('home')" ${!onboardForm.name||!onboardForm.category?'disabled':''}>Continue →</button>
    `;
  } else if(onboardStep===2){
    inner.innerHTML=`
      <div class="onboard-title">Where is your brand right now?</div>
      <div class="onboard-sub">VeyaFlow adapts its recommendations based on your stage — the tools and priorities are different for a brand entering its first market versus one managing compliance across five.</div>
      ${BRAND_STAGES.map(s=>`
        <div class="stage-option${onboardForm.stage===s.id?' selected':''}" onclick="onboardForm.stage='${s.id}';renderOnboardStep()">
          <span class="stage-option-icon">${s.icon}</span>
          <div><div class="stage-option-name">${s.label}</div><div class="stage-option-desc">${s.desc}</div></div>
        </div>
      `).join('')}
      <div class="field" style="margin-top:1rem"><label class="lbl">Home market</label>
        <select onchange="onboardForm.currentMarket=this.value">${CURRENT_MARKETS.map(m=>`<option${onboardForm.currentMarket===m?' selected':''}>${m}</option>`).join('')}</select>
      </div>
      <div class="field"><label class="lbl">Target markets</label>
        <div>${MARKETS.map(m=>`<span class="market-chip${onboardForm.targetMarkets.includes(m)?' selected':''}" onclick="toggleTarget('${m}')">${m}</span>`).join('')}</div>
      </div>
      <div style="display:flex;gap:.75rem">
        <button class="btn-outline" style="flex:0 0 auto" onclick="onboardStep=1;renderPage('home')">← Back</button>
        <button class="btn-primary" style="flex:1" onclick="onboardStep=3;renderPage('home')">Continue →</button>
      </div>
    `;
  } else if(onboardStep===3){
    inner.innerHTML=`
      <div class="onboard-title">Sustainability priorities</div>
      <div class="onboard-sub">VeyaFlow uses these to filter manufacturers by certification match, flag retailer requirements in reports, and surface compliance gaps in your supply chain before they become problems.</div>
      <div class="grid-2" style="margin-bottom:1.25rem">
        ${SUSTAINABILITY_GOALS.map(g=>`
          <div class="goal-chip${onboardForm.sustainabilityGoals.includes(g)?' selected':''}" onclick="toggleGoal('${g}')">
            <span class="goal-chip-check">✓</span>${g}
          </div>
        `).join('')}
      </div>
      <div class="field"><label class="lbl">Key products / SKUs</label><input type="text" id="ob-skus" value="${onboardForm.skus}" placeholder="e.g. LED Face Mask, Overnight Lip Tape, Silk Pillowcase" oninput="onboardForm.skus=this.value"></div>
      <div class="field"><label class="lbl">Your name</label><input type="text" id="ob-username" value="${onboardForm.userName||''}" placeholder="e.g. Charlotte" oninput="onboardForm.userName=this.value"></div>
      <div style="padding:.6rem .85rem;background:rgba(196,168,130,.08);border:1px solid rgba(196,168,130,.2);font-family:var(--mono);font-size:.58rem;color:var(--gold);line-height:1.6">
        ◈ Multi-user workspace — coming in V2. Your workspace is currently single-user. Team invites will be added once the Supabase backend is live.
      </div>
      <div style="display:flex;gap:.75rem">
        <button class="btn-outline" style="flex:0 0 auto" onclick="onboardStep=2;renderPage('home')">← Back</button>
        <button class="btn-primary" style="flex:1" onclick="onboardStep=4;renderPage('home')">Continue →</button>
      </div>
      <div style="font-family:var(--mono);font-size:.55rem;color:var(--muted);text-align:center;margin-top:.6rem">Your workspace is saved in this browser — persists between sessions</div>
    `;
  } else if(onboardStep===4){
    const proofTypes=[
      {id:'revenue',icon:'📈',label:'Revenue & sales data',desc:'Annual revenue, growth rate, units sold'},
      {id:'social',icon:'📱',label:'Social & press',desc:'Followers, TikTok views, press coverage, awards'},
      {id:'demand',icon:'🔥',label:'Demand signals',desc:'Waitlist, pre-orders, wholesale enquiries'},
      {id:'reviews',icon:'⭐',label:'Reviews & ratings',desc:'Consumer review score and count'},
    ];
    inner.innerHTML=`
      <div class="onboard-title">Your commercial proof points</div>
      <div class="onboard-sub">This data powers the Brand Pack — the retailer-ready document VeyaFlow generates for your buyer meetings. Add what you have. Everything is optional. You can update it anytime from Brand Home.</div>

      <div style="margin-bottom:1.25rem">
        <label class="lbl" style="margin-bottom:.5rem;display:block">What evidence do you have?</label>
        <div class="grid-2">
          ${proofTypes.map(pt=>`
            <div class="cat-option${onboardForm.proofType===pt.id?' selected':''}" onclick="onboardForm.proofType='${pt.id}';renderOnboardStep()" style="text-align:left;padding:.75rem">
              <div style="font-size:1.1rem;margin-bottom:.2rem">${pt.icon}</div>
              <div style="font-weight:600;font-size:.8rem;color:var(--navy)">${pt.label}</div>
              <div style="font-size:.68rem;color:var(--muted);margin-top:.1rem">${pt.desc}</div>
            </div>
          `).join('')}
        </div>
      </div>

      ${onboardForm.proofType==='revenue'?`
        <div class="field"><label class="lbl">Annual revenue <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(SEK or EUR, optional)</span></label>
          <input type="text" placeholder="e.g. 1,200,000 SEK" value="${onboardForm.annualRevenue||''}" oninput="onboardForm.annualRevenue=this.value"></div>
        <div class="field"><label class="lbl">Year-on-year growth <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
          <input type="text" placeholder="e.g. +38%" value="${onboardForm.revenueGrowth||''}" oninput="onboardForm.revenueGrowth=this.value"></div>
        <div class="field"><label class="lbl">Units sold (last 12 months) <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
          <input type="text" placeholder="e.g. 4,200" value="${onboardForm.unitsSold||''}" oninput="onboardForm.unitsSold=this.value"></div>
        <div class="field"><label class="lbl">Repeat purchase rate <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
          <input type="text" placeholder="e.g. 42%" value="${onboardForm.repeatRate||''}" oninput="onboardForm.repeatRate=this.value"></div>
        <div class="field"><label class="lbl">DTC revenue in target market <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(proves demand before retail entry)</span></label>
          <input type="text" placeholder="e.g. 180,000 SEK in Germany" value="${onboardForm.dtcRevenue||''}" oninput="onboardForm.dtcRevenue=this.value"></div>
      `:''}

      ${onboardForm.proofType==='social'?`
        <div class="field"><label class="lbl">Social media followers <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(combined, optional)</span></label>
          <input type="text" placeholder="e.g. 28,000 Instagram + 12,000 TikTok" value="${onboardForm.socialFollowers||''}" oninput="onboardForm.socialFollowers=this.value"></div>
        <div class="field"><label class="lbl">Press coverage <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(publications, optional)</span></label>
          <input type="text" placeholder="e.g. Vogue Scandinavia, Damernas Värld, Byrdie" value="${onboardForm.pressCount||''}" oninput="onboardForm.pressCount=this.value"></div>
        <div class="field"><label class="lbl">Awards & recognitions <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
          <input type="text" placeholder="e.g. Beauty Shortlist Winner 2025, CEW Finalist" value="${onboardForm.awardsCount||''}" oninput="onboardForm.awardsCount=this.value"></div>
      `:''}

      ${onboardForm.proofType==='demand'?`
        <div class="field"><label class="lbl">Waitlist or pre-order signups <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
          <input type="text" placeholder="e.g. 2,400 people signed up before launch" value="${onboardForm.waitlistCount||''}" oninput="onboardForm.waitlistCount=this.value"></div>
        <div class="field"><label class="lbl">Inbound wholesale enquiries <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
          <input type="text" placeholder="e.g. 14 retailers contacted us without pitching" value="${onboardForm.wholesaleEnquiries||''}" oninput="onboardForm.wholesaleEnquiries=this.value"></div>
      `:''}

      ${onboardForm.proofType==='reviews'?`
        <div class="field"><label class="lbl">Review score & count <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
          <input type="text" placeholder="e.g. 4.8/5 from 340 reviews on Trustpilot" value="${onboardForm.reviewScore||''}" oninput="onboardForm.reviewScore=this.value"></div>
      `:''}

      <div class="field" style="margin-top:.5rem"><label class="lbl">Clinical / efficacy claims <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
        <input type="text" placeholder="e.g. Clinically tested to reduce fine lines by 23% after 8 weeks" value="${onboardForm.clinicalClaims||''}" oninput="onboardForm.clinicalClaims=this.value"></div>

      <div class="field"><label class="lbl">Routine / protocol position <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
        <input type="text" placeholder="e.g. Step 5 of the overnight ritual — amplifies the serum" value="${onboardForm.routineStep||''}" oninput="onboardForm.routineStep=this.value"></div>

      <div class="field"><label class="lbl">Basket impact claim <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
        <input type="text" placeholder="e.g. Customers who buy our LED mask spend 3x more on serums" value="${onboardForm.basketImpact||''}" oninput="onboardForm.basketImpact=this.value"></div>

      <div style="display:flex;gap:.75rem;margin-top:.5rem">
        <button class="btn-outline" style="flex:0 0 auto" onclick="onboardStep=3;renderPage('home')">← Back</button>
        <button class="btn-primary" style="flex:1" onclick="completeOnboard()">Set up ${onboardForm.name||'my brand'} workspace →</button>
      </div>
      <div style="font-family:var(--mono);font-size:.55rem;color:var(--muted);text-align:center;margin-top:.6rem">All proof point fields are optional — add what you have now, update anytime</div>
    `;
  }
}

function toggleTarget(m){
  const i=onboardForm.targetMarkets.indexOf(m);
  if(i>=0)onboardForm.targetMarkets.splice(i,1);
  else onboardForm.targetMarkets.push(m);
  renderOnboardStep();
}
function toggleGoal(g){
  const i=onboardForm.sustainabilityGoals.indexOf(g);
  if(i>=0)onboardForm.sustainabilityGoals.splice(i,1);
  else onboardForm.sustainabilityGoals.push(g);
  renderOnboardStep();
}
function renderProofSummary(){
  if(!brand) return '<div style="font-family:var(--sans);font-size:.75rem;color:var(--muted);padding:.5rem 0">No proof points added yet. <span onclick="showProofEdit()" style="color:var(--gold);cursor:pointer;text-decoration:underline">Add now →</span></div>';
  const items=[];
  if(brand.annualRevenue) items.push({icon:'📈',label:'Revenue',val:brand.annualRevenue+(brand.revenueGrowth?' · '+brand.revenueGrowth:'')});
  if(brand.unitsSold) items.push({icon:'📦',label:'Units sold',val:brand.unitsSold});
  if(brand.repeatRate) items.push({icon:'🔄',label:'Repeat rate',val:brand.repeatRate});
  if(brand.dtcRevenue) items.push({icon:'🌍',label:'DTC in target market',val:brand.dtcRevenue});
  if(brand.socialFollowers) items.push({icon:'📱',label:'Social reach',val:brand.socialFollowers});
  if(brand.pressCount) items.push({icon:'📰',label:'Press',val:brand.pressCount});
  if(brand.awardsCount) items.push({icon:'🏆',label:'Awards',val:brand.awardsCount});
  if(brand.waitlistCount) items.push({icon:'🔥',label:'Waitlist',val:brand.waitlistCount});
  if(brand.wholesaleEnquiries) items.push({icon:'🏪',label:'Wholesale enquiries',val:brand.wholesaleEnquiries});
  if(brand.reviewScore) items.push({icon:'⭐',label:'Reviews',val:brand.reviewScore});
  if(brand.clinicalClaims) items.push({icon:'🔬',label:'Clinical evidence',val:brand.clinicalClaims});
  if(brand.routineStep) items.push({icon:'💆',label:'Routine position',val:brand.routineStep});
  if(brand.basketImpact) items.push({icon:'🛒',label:'Basket impact',val:brand.basketImpact});
  if(!items.length) return '<div style="font-family:var(--sans);font-size:.75rem;color:var(--muted);padding:.5rem 0">No proof points added yet. <span onclick="showProofEdit()" style="color:var(--gold);cursor:pointer;text-decoration:underline">Add now →</span></div>';
  return items.map(i=>`
    <div style="display:flex;gap:.6rem;align-items:flex-start;padding:.35rem 0;border-bottom:1px solid var(--border)">
      <span style="flex-shrink:0;font-size:.9rem">${i.icon}</span>
      <div>
        <div style="font-family:var(--mono);font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">${i.label}</div>
        <div style="font-family:var(--sans);font-size:.78rem;color:#333;margin-top:.1rem">${i.val}</div>
      </div>
    </div>
  `).join('');
}

function showProofEdit(){
  const proofTypes=[
    {id:'revenue',icon:'📈',label:'Revenue & sales'},
    {id:'social',icon:'📱',label:'Social & press'},
    {id:'demand',icon:'🔥',label:'Demand signals'},
    {id:'reviews',icon:'⭐',label:'Reviews'},
  ];
  let currentType = brand.proofType||'revenue';

  function renderProofModal(){
    document.getElementById('proof-modal-fields').innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem">
        ${proofTypes.map(pt=>`
          <div onclick="document.getElementById('proof-type-${pt.id}').click()" style="border:1px solid ${currentType===pt.id?'var(--navy)':'var(--border)'};background:${currentType===pt.id?'#EFF6FF':'#fff'};padding:.6rem;cursor:pointer">
            <div style="font-size:.9rem">${pt.icon}</div>
            <div style="font-family:var(--sans);font-size:.72rem;font-weight:600;color:var(--navy)">${pt.label}</div>
            <input type="radio" id="proof-type-${pt.id}" name="proof-type" value="${pt.id}" ${currentType===pt.id?'checked':''} onchange="currentType=this.value;renderProofModal()" style="display:none">
          </div>
        `).join('')}
      </div>
      ${currentType==='revenue'?`
        <div class="field"><label class="lbl">Annual revenue</label><input type="text" id="pf-revenue" placeholder="e.g. 1,200,000 SEK" value="${brand.annualRevenue||''}"></div>
        <div class="field"><label class="lbl">YoY growth</label><input type="text" id="pf-growth" placeholder="e.g. +38%" value="${brand.revenueGrowth||''}"></div>
        <div class="field"><label class="lbl">Units sold (12 months)</label><input type="text" id="pf-units" placeholder="e.g. 4,200" value="${brand.unitsSold||''}"></div>
        <div class="field"><label class="lbl">Repeat purchase rate</label><input type="text" id="pf-repeat" placeholder="e.g. 42%" value="${brand.repeatRate||''}"></div>
        <div class="field"><label class="lbl">DTC revenue in target market</label><input type="text" id="pf-dtc" placeholder="e.g. 180,000 SEK in Germany" value="${brand.dtcRevenue||''}"></div>
      `:''}
      ${currentType==='social'?`
        <div class="field"><label class="lbl">Social media followers</label><input type="text" id="pf-social" placeholder="e.g. 28,000 Instagram + 12,000 TikTok" value="${brand.socialFollowers||''}"></div>
        <div class="field"><label class="lbl">Press coverage</label><input type="text" id="pf-press" placeholder="e.g. Vogue Scandinavia, Byrdie, Damernas Värld" value="${brand.pressCount||''}"></div>
        <div class="field"><label class="lbl">Awards & recognitions</label><input type="text" id="pf-awards" placeholder="e.g. Beauty Shortlist Winner 2025" value="${brand.awardsCount||''}"></div>
      `:''}
      ${currentType==='demand'?`
        <div class="field"><label class="lbl">Waitlist / pre-order signups</label><input type="text" id="pf-waitlist" placeholder="e.g. 2,400 signups before launch" value="${brand.waitlistCount||''}"></div>
        <div class="field"><label class="lbl">Inbound wholesale enquiries</label><input type="text" id="pf-wholesale" placeholder="e.g. 14 retailers contacted us" value="${brand.wholesaleEnquiries||''}"></div>
      `:''}
      ${currentType==='reviews'?`
        <div class="field"><label class="lbl">Review score & count</label><input type="text" id="pf-review" placeholder="e.g. 4.8/5 from 340 reviews on Trustpilot" value="${brand.reviewScore||''}"></div>
      `:''}
      <hr style="border:none;border-top:1px solid var(--border);margin:.75rem 0">
      <div class="field"><label class="lbl">Clinical / efficacy claims</label><input type="text" id="pf-clinical" placeholder="e.g. Clinically tested — reduces fine lines 23% in 8 weeks" value="${brand.clinicalClaims||''}"></div>
      <div class="field"><label class="lbl">Routine / protocol position</label><input type="text" id="pf-routine" placeholder="e.g. Step 5 of overnight ritual — amplifies the serum" value="${brand.routineStep||''}"></div>
      <div class="field"><label class="lbl">Basket impact claim</label><input type="text" id="pf-basket" placeholder="e.g. LED mask buyers spend 3x more on serums" value="${brand.basketImpact||''}"></div>
    `;
  }

  const modal = document.createElement('div');
  modal.id = 'proof-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem;overflow-y:auto';
  modal.innerHTML = `
    <div style="background:#fff;width:100%;max-width:520px;padding:1.5rem;max-height:90vh;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <div style="font-family:var(--serif);font-size:1.1rem;color:var(--navy)">Commercial proof points</div>
        <span onclick="document.getElementById('proof-modal').remove()" style="cursor:pointer;font-size:1.2rem;color:var(--muted)">✕</span>
      </div>
      <div style="font-family:var(--sans);font-size:.78rem;color:var(--muted);margin-bottom:1rem;line-height:1.6">These proof points appear in your Brand Pack — the retailer-ready document for buyer meetings. All fields are optional.</div>
      <div id="proof-modal-fields"></div>
      <button class="btn-primary" style="width:100%;margin-top:.5rem" onclick="saveProofPoints('${'' /* will be set */}')">Save proof points</button>
    </div>
  `;
  document.body.appendChild(modal);
  renderProofModal();

  // Override the save button with correct closure
  modal.querySelector('.btn-primary').onclick = function(){
    brand.proofType = currentType;
    if(currentType==='revenue'){
      brand.annualRevenue = document.getElementById('pf-revenue')?.value||'';
      brand.revenueGrowth = document.getElementById('pf-growth')?.value||'';
      brand.unitsSold = document.getElementById('pf-units')?.value||'';
      brand.repeatRate = document.getElementById('pf-repeat')?.value||'';
      brand.dtcRevenue = document.getElementById('pf-dtc')?.value||'';
    } else if(currentType==='social'){
      brand.socialFollowers = document.getElementById('pf-social')?.value||'';
      brand.pressCount = document.getElementById('pf-press')?.value||'';
      brand.awardsCount = document.getElementById('pf-awards')?.value||'';
    } else if(currentType==='demand'){
      brand.waitlistCount = document.getElementById('pf-waitlist')?.value||'';
      brand.wholesaleEnquiries = document.getElementById('pf-wholesale')?.value||'';
    } else if(currentType==='reviews'){
      brand.reviewScore = document.getElementById('pf-review')?.value||'';
    }
    brand.clinicalClaims = document.getElementById('pf-clinical')?.value||'';
    brand.routineStep = document.getElementById('pf-routine')?.value||'';
    brand.basketImpact = document.getElementById('pf-basket')?.value||'';
    saveBrandState();
    modal.remove();
    const summaryEl = document.getElementById('proof-summary');
    if(summaryEl) summaryEl.innerHTML = renderProofSummary();
  };
}

function completeOnboard(){
  brand={...onboardForm,createdAt:new Date().toISOString()};
  saveBrandState();
  onboardStep=1;
  onboardForm={name:'',website:'',category:'',currentMarket:'Sweden',targetMarkets:[],skus:'',stage:'trading',sustainabilityGoals:[],usp:'',userName:'',teamEmails:'',proofType:'revenue',annualRevenue:'',revenueGrowth:'',unitsSold:'',repeatRate:'',avgOrderValue:'',dtcRevenue:'',waitlistCount:'',socialFollowers:'',pressCount:'',awardsCount:'',reviewScore:'',wholesaleEnquiries:'',clinicalClaims:'',routineStep:'',basketImpact:''};
  renderPage('home');
}

function renderDashboard(el){
  const stage=BRAND_STAGES.find(s=>s.id===brand.stage)||BRAND_STAGES[2];
  const steps=NEXT_STEPS[brand.stage]||NEXT_STEPS.trading;
  const reports=savedReports.slice(0,5);
  el.innerHTML=`
    <div class="topbar">
      <div>
        <div style="font-family:var(--mono);font-size:.58rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.2rem">Workspace</div>
        <div class="page-title">${brand.name}</div>
        <div class="page-sub">${brand.category} · ${brand.currentMarket}${brand.targetMarkets?.length?' → '+brand.targetMarkets.slice(0,3).join(', ')+(brand.targetMarkets.length>3?' +'+( brand.targetMarkets.length-3):''):''}</div>
      </div>

function bindReportForm(){
  const fields=['brandName','brandDesc','category','skus','currentMarket','targetMarket','pricePoint'];
  fields.forEach(f=>{
    const el=document.getElementById('r-'+f);
    if(el){
      el.addEventListener('input',()=>{
        reportForm[f]=el.value;
        updateReportBtn();
      });
      el.addEventListener('change',()=>{
        reportForm[f]=el.value;
        updateReportBtn();
      });
    }
  });
  updateReportBtn();
}

function updateReportBtn(){
  const btn=document.getElementById('r-generate-btn');
  if(btn) btn.disabled=!reportForm.brandName||!reportForm.category||!reportForm.targetMarket;
}

function getRetailerIntel(retailerName, market){
  // Find retailer intel by name (partial match)
  const key = Object.keys(RETAILER_INTEL).find(k =>
    retailerName.toLowerCase().includes(k.toLowerCase()) ||
    k.toLowerCase().includes(retailerName.toLowerCase())
  );
  return key ? RETAILER_INTEL[key] : null;
}

function getMarketRetailerIntel(market, category){
  var entries = Object.entries(RETAILER_INTEL);
  var filtered = entries.filter(function(e){ return e[1].market.indexOf(market) !== -1; });
  var mapped = filtered.map(function(e){
    var name = e[0];
    var d = e[1];
    var parts = [
      name.toUpperCase(),
      'Strategy 2026: ' + d.strategy2026,
      'Buyer priority: ' + d.buyerPriority,
      'Margin: ' + d.marginExpectation + ' | MOQ: ' + d.moq,
      'Category focus: ' + d.categoryFocus,
      'Fit signal: ' + d.fitSignal,
      'How to approach: ' + d.approach
    ];
    if(d.basketSize) parts.push('Average basket: ' + d.basketSize);
    return parts.join('\n');
  });
  return mapped.join('\n---\n') || '';
}

function parseMarkdown(text){
  if(!text) return '';
  var t = text;
  // Headers
  t = t.replace(/^#### (.+)$/gm,'<h4 style="font-family:var(--sans);font-size:.82rem;font-weight:700;color:var(--navy);margin:1rem 0 .3rem">$1</h4>');
  t = t.replace(/^### (.+)$/gm,'<h3 style="font-family:var(--sans);font-size:.88rem;font-weight:700;color:var(--navy);margin:1.1rem 0 .35rem">$1</h3>');
  t = t.replace(/^## (.+)$/gm,'<h2 style="font-family:var(--serif);font-size:1rem;font-weight:400;color:var(--navy);margin:1.25rem 0 .4rem;padding-bottom:.25rem;border-bottom:1px solid var(--border)">$1</h2>');
  t = t.replace(/^# (.+)$/gm,'<h2 style="font-family:var(--serif);font-size:1.05rem;font-weight:400;color:var(--navy);margin:1.25rem 0 .4rem">$1</h2>');
  // Bold and italic
  t = t.replace(/\*\*([^*]+?)\*\*/g,'<strong style="color:var(--navy)">$1</strong>');
  t = t.replace(/\*([^*]+?)\*/g,'<em>$1</em>');
  // Horizontal rules
  t = t.replace(/^---+$/gm,'<hr style="border:none;border-top:1px solid var(--border);margin:.75rem 0">');
  // Status badges
  t = t.replace(/\bSTRONG FIT\b/g,'<span style="display:inline-block;background:#ECFDF5;color:#065F46;font-family:var(--mono);font-size:.65rem;font-weight:700;padding:.1rem .5rem;border:1px solid #A7F3D0">STRONG FIT</span>');
  t = t.replace(/\bPOSSIBLE FIT\b/g,'<span style="display:inline-block;background:#FFFBEB;color:#92400E;font-family:var(--mono);font-size:.65rem;font-weight:700;padding:.1rem .5rem;border:1px solid #FCD34D">POSSIBLE FIT</span>');
  t = t.replace(/\bNOT YET\b/g,'<span style="display:inline-block;background:#FEF2F2;color:#991B1B;font-family:var(--mono);font-size:.65rem;font-weight:700;padding:.1rem .5rem;border:1px solid #FCA5A5">NOT YET</span>');
  t = t.replace(/\bSTRONG FIT\b/g,'<span style="display:inline-block;background:#ECFDF5;color:#065F46;font-family:var(--mono);font-size:.65rem;font-weight:700;padding:.1rem .5rem">STRONG FIT</span>');
  t = t.replace(/\bCRITICAL\b/g,'<span style="display:inline-block;background:#FEF2F2;color:#991B1B;font-family:var(--mono);font-size:.6rem;font-weight:700;padding:.1rem .4rem">CRITICAL</span>');
  t = t.replace(/\bIMPORTANT\b/g,'<span style="display:inline-block;background:#FFFBEB;color:#92400E;font-family:var(--mono);font-size:.6rem;font-weight:700;padding:.1rem .4rem">IMPORTANT</span>');
  // Score badges
  t = t.replace(/([\d.]+)\/10/g,'<span style="display:inline-block;background:var(--navy);color:var(--gold);font-family:var(--mono);font-size:.85rem;font-weight:700;padding:.1rem .4rem">$1/10</span>');
  // Bullet points
  t = t.replace(/^[-*] (.+)$/gm,'<div style="display:flex;gap:.5rem;padding:.2rem 0"><span style="color:var(--gold);flex-shrink:0;font-weight:700">&#8211;</span><span>$1</span></div>');
  // Numbered list items
  t = t.replace(/^(\d+)\. (.+)$/gm,'<div style="display:flex;gap:.5rem;padding:.2rem 0"><span style="color:var(--navy);flex-shrink:0;font-family:var(--mono);font-size:.75rem;font-weight:700;min-width:1.2rem">$1.</span><span>$2</span></div>');
  // Table rows — convert | col | col | to styled rows
  t = t.replace(/^\|(.+)\|$/gm, function(match, inner){
    var cells = inner.split('|').map(function(c){ return c.trim(); });
    if(cells.every(function(c){ return /^[-: ]+$/.test(c); })) return '';
    return '<div style="display:grid;grid-template-columns:repeat('+cells.length+',1fr);border-bottom:1px solid var(--border)">' +
      cells.map(function(c,i){
        var val = c||'';
        var isEmpty = val.trim()==='';
        return '<div style="padding:.4rem .6rem;font-family:var(--sans);font-size:.78rem;'+(i===0?'font-weight:600;color:var(--navy)':'color:#333')+(isEmpty?';color:#bbb;font-style:italic':'')+'">'+(isEmpty?'—':val)+'</div>';
      }).join('') + '</div>';
  });
  // Paragraph breaks
  t = t.replace(/\n\n/g,'</p><p style="margin:.5rem 0">');
  t = t.replace(/\n/g,'<br>');
  return t;
}

async function runCompare(){
  const btn=document.getElementById('cm-btn');
  if(btn){btn.disabled=true;btn.textContent='Analysing markets…';}
  const prompt=`You are VeyaFlow AI. Compare these markets for a Nordic brand.

[Which market should they enter first and why — 2 sentences]

${compareForm.markets.map(m=>`MARKET: ${m}

Verdict: [one sentence recommendation]`).join('\n\n')}

function renderCompareResult(){

  const recMatch=r.text.match(/RECOMMENDATION\s*\n([\s\S]*?)$/);

}

  if(brand.unitsSold) proofPoints.push(`Units sold: ${brand.unitsSold}`);
  if(brand.repeatRate) proofPoints.push(`Repeat rate: ${brand.repeatRate}`);
  if(brand.dtcRevenue) proofPoints.push(`DTC in target market: ${brand.dtcRevenue}`);
  if(brand.socialFollowers) proofPoints.push(`Social reach: ${brand.socialFollowers}`);
  if(brand.pressCount) proofPoints.push(`Press: ${brand.pressCount}`);
  if(brand.awardsCount) proofPoints.push(`Awards: ${brand.awardsCount}`);
  if(brand.waitlistCount) proofPoints.push(`Waitlist: ${brand.waitlistCount}`);
  if(brand.wholesaleEnquiries) proofPoints.push(`Wholesale enquiries: ${brand.wholesaleEnquiries}`);
  if(brand.reviewScore) proofPoints.push(`Reviews: ${brand.reviewScore}`);
  if(brand.clinicalClaims) proofPoints.push(`Clinical evidence: ${brand.clinicalClaims}`);
  if(brand.routineStep) proofPoints.push(`Routine position: ${brand.routineStep}`);
  if(brand.basketImpact) proofPoints.push(`Basket impact: ${brand.basketImpact}`);

  const prompt = `You are VeyaFlow AI — a B2B brand intelligence platform for Nordic consumer brands.

async function generatePitch(){
  const btn=document.getElementById('p-generate-btn');
  if(btn){btn.disabled=true;btn.textContent='Writing pitch…';}
  const rd=RETAILERS[pitchForm.retailer];
  const langName=LANG_NAMES[rd?.language||'en'];
  const prompt=`You are a senior export sales consultant helping a Nordic brand pitch to a specific retail buyer. Write a professional, warm, and persuasive buyer outreach email.

Brand: ${pitchForm.brandName}
Description: ${pitchForm.brandDesc||'A premium Nordic brand'}
Category: ${pitchForm.category}
Key products / SKUs: ${pitchForm.skus||'Premium products in the '+pitchForm.category+' category'}
USP / brand positioning: ${pitchForm.usp||'Premium Scandinavian quality, clean ingredients, sustainability-focused'}
Price point: ${pitchForm.pricePoint||'Premium'}
Already selling in: ${pitchForm.existingMarkets||'Sweden'}

Target retailer: ${pitchForm.retailer}
Retailer type: ${rd?.type||''}
Country: ${rd?.country||pitchForm.targetMarket}
What this buyer cares about most: ${rd?.buyerPriority||'quality, fit with their range, sales potential'}
Practical notes: ${rd?.minOrderNote||''}

Write the email in ${langName}. ${rd?.language!=='en'?'Include an English translation below.':''}

The email must:
1. Have a compelling subject line that doesn’t sound like a mass pitch
2. Open with a specific reference to ${pitchForm.retailer} — show the brand has done their homework
3. Introduce the brand in 2–3 sentences — Nordic origin, what makes it different
4. Explain specifically why this brand fits ${pitchForm.retailer}'s range
5. Name 2–3 specific products with brief descriptions
6. Make one clear ask — a 15-minute call or sample request
7. Keep it under 200 words in the main body
8. Sound like it was written by the brand's export or sales lead — professional but personal, not corporate
9. Close with [Your name] placeholder

Format:
SUBJECT: [subject line]
---
[Full email in ${langName}]
${rd?.language!=='en'?'---\nENGLISH TRANSLATION:\n[Full email in English]':''}
---
BUYER INTEL:
• [specific intel 1]
• [specific intel 2]
• [specific intel 3]`;

  try{
    const text=await callAPI([{role:"user",content:prompt}]);
    const subjMatch=text.match(/SUBJECT:\s*(.+)/);
    const parts=text.split('---');
    const body=parts[1]?.trim()||'';
    const trans=rd?.language!=='en'?(text.split('ENGLISH TRANSLATION:')[1]?.split('---')[0]?.trim()||''):'';
    const intelRaw=text.split('BUYER INTEL:')[1]?.trim()||'';
    const intel=intelRaw.split('\n').filter(l=>l.trim().startsWith('•')||l.trim().startsWith('-')).map(l=>l.replace(/^[•\-]\s*/,'')).filter(Boolean).slice(0,3);
    pitchResult={subj:subjMatch?subjMatch[1].trim():'',body,trans,intel,retailer:pitchForm.retailer,market:pitchForm.targetMarket,brand:pitchForm.brandName,lang:rd?.language||'en'};
    savePageState('ns_pitchForm',pitchForm);
    savePageState('ns_pitchResult',pitchResult);
    const resultEl=document.getElementById('pitch-result');
    if(resultEl)resultEl.innerHTML=renderPitchResult();
    if(btn){btn.disabled=false;btn.textContent=`Generate pitch for ${pitchForm.retailer} →`;}
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent=`Generate pitch for ${pitchForm.retailer} →`;}
    alert('Could not generate pitch: '+e.message);
  }
}

function selectSupplier(id){
  const s=SUPPLIERS.find(x=>x.id===id);
  if(!s||s.status==='complete')return;
  if(selectedSupplier?.id===id){selectedSupplier=null;nudgeResult=null;}
  else{selectedSupplier=s;nudgeResult=null;generateNudge(s);}
  renderSuppliers(document.getElementById('page-suppliers'));
}

function renderNudgePanel(s){
  if(nudgeLoading) return `<div style="text-align:center;padding:1.5rem"><div class="spinner"></div><div style="font-family:var(--mono);font-size:.6rem;color:var(--muted)">Writing nudge for ${s.name}…</div></div>`;
  if(!nudgeResult) return `<div style="font-family:var(--mono);font-size:.6rem;color:var(--muted)">Generating nudge email…</div>`;
  return `
    <div style="font-family:var(--mono);font-size:.58rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.65rem">★ Nudge email</div>
    <div class="email-box" style="font-size:.78rem;margin-bottom:.75rem">${nudgeResult}</div>

    </div>

async function generateNudge(s){
  nudgeLoading=true;
  nudgeResult=null;
  const langMap={Portugal:"Portuguese",Germany:"German",Sweden:"Swedish",Indonesia:"Indonesian",Turkey:"Turkish",China:"Mandarin Chinese",Ghana:"English",Italy:"Italian",Sweden:"Swedish"};
  const lang=langMap[s.country]||"English";
  const prompt=`Write a professional, friendly supplier nudge email in ${lang} (with English translation if not English) requesting missing compliance data.

Supplier: ${s.name}, ${s.country}
Commodity: ${s.commodity}
Missing data: ${s.missing.map(m=>DATA_LABELS[m]||m).join(", ")}
Previous nudges sent: ${s.nudgeCount}
Status: ${s.status}
EUDR in scope: ${s.eudrScope?"Yes — urgent":"No"}

Write a concise, professional email that:
1. Addresses the supplier by company name
2. Explains why this data is needed (EU regulatory compliance by December 2026)
3. Lists exactly what is missing
4. Gives a clear deadline (14 days)
5. Offers help if they have questions
6. Is warm but firm — not aggressive

Keep it under 150 words. ${lang!=="English"?"Then provide an English translation.":""}`;
  try{
    const text=await callAPI([{role:"user",content:prompt}],800);
    nudgeResult=text;
  }catch(e){
    nudgeResult="Could not generate nudge. Check connection.";
  }
  nudgeLoading=false;
  const panel=document.getElementById(`nudge-panel-${s.id}`);
  if(panel)panel.innerHTML=renderNudgePanel(s);
}

async function generateCircularRoutes(){
  const btn=document.getElementById('c-btn');
  if(btn){btn.disabled=true;btn.textContent='Finding routes…';}
  circularLoading=true;

  const isBan=ESPR_BAN_CATS.includes(circularForm.category);
  const isDisc=ESPR_DISC_CATS.includes(circularForm.category);
  const relPartners=PARTNERS.filter(p=>!circularForm.category||p.productCategories.includes(circularForm.category));

  const prompt=`You are the VeyaFlow Circular GPS. Route ${circularForm.units} units of "${circularForm.productName}" (category: ${circularForm.category}, materials: ${circularForm.materials||'unspecified'}) to circular partners.

${isBan?'CRITICAL: This product is subject to the EU July 2026 Textile Destruction Ban — routing is legally mandatory.':isDisc?'Note: ESPR Article 24 disclosure is required for this product category.':'Note: Circular routing is best practice for sustainability positioning.'}

Discard reason: ${circularForm.reason?.replace(/_/g,' ')}
Preferred route: ${circularForm.preferredCat||'Any'}

Available partners:
${relPartners.map(p=>`- ${p.name} (${p.city}, ${p.country}): ${p.category}, ESPR registered: ${p.espr}, buyback: ${p.buyback?'€'+p.buyback+'/unit':'none'}. ${p.description}`).join('\n')}

Recommend top 3 partners. For each:
1. Why it is the best fit for this specific product
2. Estimated carbon saved vs landfill (kg CO2e — use 2.1kg/unit baseline)
3. ESPR compliance documentation they provide
4. Routing recommendation: LEAD, SECONDARY, or HOLD

Format as 3 numbered recommendations.`;

  try{
    const text=await callAPI([{role:"user",content:prompt}]);
    const parts=text.split(/\n(?=\d+\.\s)/g).filter(s=>s.trim().length>20).slice(0,3);
    const routes=parts.map((p,i)=>{
      const partner=relPartners[i]||relPartners[0]||PARTNERS[0];
      return{partner,analysis:p.replace(/^\d+\.\s/,'').trim(),carbonSaved:Math.round(parseInt(circularForm.units||100)*(1.8+i*0.3)*10)/10,recommendation:["LEAD","SECONDARY","HOLD"][i]};
    });
    circularResult={routes,units:circularForm.units,category:circularForm.category,isBan,isDisc};
    savePageState('ns_circularForm',circularForm);
    savePageState('ns_circularResult',circularResult);
  }catch(e){
    circularResult=null;
    alert('Could not find routes: '+e.message);
  }
  circularLoading=false;
  if(btn){btn.disabled=false;btn.textContent='Find circular routes →';}
  const resEl=document.getElementById('circular-results');
  if(resEl)resEl.innerHTML=circularResult?renderCircularResults():'';
}

  if(!circularResult)return'';
  const r=circularResult;
  const REC_COLORS={LEAD:"#10B981",SECONDARY:"#F59E0B",HOLD:"#9A9489"};

  return `

      <div class="stat-card" style="color:var(--green)"><div class="stat-num" style="color:var(--green)" style="font-size:1.2rem">${r.isBan?'Ban ✓':r.isDisc?'Disc ✓':'Best ✓'}</div><div class="stat-label">ESPR status</div></div>
    </div>
    ${r.routes.map((rt,i)=>`
      <div style="border:1px solid var(--border);border-left:3px solid ${REC_COLORS[rt.recommendation]};background:#fff;padding:1rem 1.1rem;margin-bottom:.65rem;cursor:pointer" onclick="this.querySelector('.route-detail').style.display=this.querySelector('.route-detail').style.display==='none'?'block':'none'">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;flex-wrap:wrap;gap:.4rem">
          <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
            <span class="tag" style="background:${CAT_COLORS[rt.partner.category]||'#EDE9E1'};color:${CAT_TEXT[rt.partner.category]||'#333'}">${rt.partner.category}</span>
            <span style="font-size:.9rem;color:var(--navy)">${rt.partner.name}</span>
          </div>
          <div style="display:flex;gap:.35rem;align-items:center;flex-wrap:wrap">
            ${rt.partner.buyback?`<span class="tag tag-green">+€${rt.partner.buyback}/unit</span>`:''}
            ${rt.partner.espr?`<span class="tag tag-blue">ESPR ✓</span>`:''}
            <span style="font-family:var(--mono);font-size:.6rem;font-weight:700;color:${REC_COLORS[rt.recommendation]}">${rt.recommendation}</span>
          </div>

        <div style="font-family:var(--sans);font-size:.68rem;color:var(--muted)">${rt.partner.city}, ${rt.partner.country} · ${rt.carbonSaved} kg CO₂e saved</div>
        <div class="route-detail" style="display:none;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)">
          <div class="prose" style="font-size:.78rem">${rt.analysis}</div>

        <div style="font-family:var(--mono);font-size:.58rem;color:var(--gold);margin-top:.5rem">Click for full analysis →</div>
      </div>
    `).join('')}
    <button class="btn-outline" onclick="circularResult=null;renderCircular(document.getElementById('page-circular'))">← New route</button>
  `;
}

function getFilteredMfrs(){
  savePageState('ns_findForm',findForm);
  return MANUFACTURERS.filter(m=>{
    const q=findForm.query.toLowerCase();
    const mQ=!q||[m.name,m.country,m.city,m.type,...m.specialties,...m.certifications].some(x=>x.toLowerCase().includes(q));
    const mC=!findForm.category||m.categories.includes(findForm.category);
    const mM=!findForm.targetMarket||m.markets.includes(findForm.targetMarket);
    const mS=!findForm.sustainability||m.sustainability===findForm.sustainability;
    const mMoq=!findForm.maxMoq||m.moq<=parseInt(findForm.maxMoq);
    const mT=!findForm.mfrType||m.type===findForm.mfrType;
    return mQ&&mC&&mM&&mS&&mMoq&&mT;
  }).sort((a,b)=>calcSusScore(b)-calcSusScore(a));
}

function renderFind(el){
  findForm.category=findForm.category||brand?.category||'';

function toggleFindCompare(id){
  const i=compareListIds.indexOf(id);
  if(i>=0)compareListIds.splice(i,1);
  else if(compareListIds.length<3)compareListIds.push(id);
  renderFind(document.getElementById('page-find'));
}

async function toggleFindAi(id){
  if(findSelected===id&&findAiCache[id]){findSelected=null;}
  else{
    findSelected=id;
    if(!findAiCache[id]){
      findLoadingId=id;
      renderFind(document.getElementById('page-find'));
      const mfr=MANUFACTURERS.find(m=>m.id===id);
      if(!mfr)return;
      try{
        const text=await callAPI([{role:"user",content:`You are a Nordic brand export consultant. Assess this manufacturer.
Manufacturer: ${mfr.name}, ${mfr.city}, ${mfr.country}
Type: ${mfr.type} | Specialties: ${mfr.specialties.join(', ')}
Certifications: ${mfr.certifications.join(', ')}
MOQ: ${mfr.moq} | Lead time: ${mfr.leadWeeks} weeks | Capacity: ${mfr.annualCapacity}
Brand category: ${findForm.category||brand?.category||'Skincare & Beauty'}
Target market: ${findForm.targetMarket||brand?.targetMarkets?.[0]||'EU'}
Brand sustainability goals: ${brand?.sustainabilityGoals?.join(', ')||'sustainability-focused'}

Write assessment with these EXACT headers on their own line:
SUSTAINABILITY FIT — 2-3 sentences
MARKET READINESS — 2-3 sentences  
WHAT TO ASK FIRST — 3 specific questions
RED FLAGS — concerns or none
VERDICT — one sentence`}]);
        findAiCache[id]=text;
      }catch(e){findAiCache[id]='Could not load assessment.';}
      findLoadingId=null;
    }
  }
  renderFind(document.getElementById('page-find'));
}

function renderMfrAiPanel(mfr){
  if(findLoadingId===mfr.id)return`<div style="text-align:center;padding:1.5rem"><div class="spinner"></div><div style="font-family:var(--mono);font-size:.6rem;color:var(--muted)">Analysing ${mfr.name}…</div></div>`;
  if(!findAiCache[mfr.id])return'';
  const text=findAiCache[mfr.id];
  const sections=["SUSTAINABILITY FIT","MARKET READINESS","WHAT TO ASK FIRST","RED FLAGS","VERDICT"];
  const colors={"SUSTAINABILITY FIT":"#10B981","MARKET READINESS":var_navy,"WHAT TO ASK FIRST":"#C4A882","RED FLAGS":"#EF4444","VERDICT":"#1E3A5F"};
  let html=`<div style="font-family:var(--mono);font-size:.58rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.75rem">★ AI assessment — ${mfr.name}</div>`;
  sections.forEach(s=>{
    const parts=text.split(new RegExp(s+"[^\\n]*\\n","i"));
    const content=parts[1]?.split(/\n[A-Z ]{4,}[—:\-]/)[0]?.trim();
    if(content&&content.length>5){
      html+=`<div class="analysis-section" style="border-left-color:${colors[s]||'#EDE9E1'};margin-bottom:.65rem"><div class="analysis-label" style="color:${colors[s]||'var(--muted)'}">${s}</div><div class="analysis-text">${content}</div></div>`;
    }
  });
  return html;
}


function renderCompareTable(items){
  const rows=[

    {label:"Lead time",fn:m=>m.leadWeeks+' weeks'},

  return `

          <tr>
            <th>ATTRIBUTE</th>

          </tr>
        </thead>
        <tbody>
          ${rows.map(row=>`
            <tr>
              <td class="row-label">${row.label}</td>
              ${items.map(m=>`<td>${row.fn(m)}</td>`).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    ${!compareAiResult&&!compareAiLoading?`
      <button class="btn-primary" style="max-width:400px" onclick="runMfrCompareAi()">Generate AI comparison of ${items.map(m=>m.name).join(' vs ')} →</button>
    `:''}
    ${compareAiLoading?`<div style="text-align:center;padding:2rem"><div class="spinner"></div><div style="font-family:var(--mono);font-size:.6rem;color:var(--muted)">Comparing manufacturers…</div></div>`:''}
    ${compareAiResult?`
      <div class="card">
        <div style="font-family:var(--mono);font-size:.58rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.85rem">★ AI Comparison — ${items.map(m=>m.name).join(' vs ')}</div>
        <div class="prose">${compareAiResult}</div>
        <div style="display:flex;gap:.65rem;margin-top:1rem;flex-wrap:wrap">
          ${items.map(m=>`<a href="mailto:${m.contact}?subject=${encodeURIComponent('Partnership enquiry — ' + (brand?.name||'Our brand') + ' x ' + m.name)}&body=${encodeURIComponent('Dear ' + m.name + ' team,\n\nI am reaching out from ' + (brand?.name||'[Brand name]') + ' regarding a potential manufacturing partnership.\n\nWe would love to learn more about your capabilities, MOQ, and process for onboarding new brands.\n\nBest regards,\n' + (brand?.userName||'[Your name]'))}" style="padding:.45rem .9rem;background:none;border:1px solid var(--border);color:var(--navy);font-family:var(--mono);font-size:.6rem;text-decoration:none">Email ${m.name.split(' ')[0]} →</a>`).join('')}
        </div>
      </div>
    `:''}
    <div style="margin-top:1rem"><button class="btn-outline" onclick="compareMode=false;compareAiResult=null;renderFind(document.getElementById('page-find'))">← Back to list</button></div>
  `;
}

async function runMfrCompareAi(){
  compareAiLoading=true;
  renderFind(document.getElementById('page-find'));
  const items=compareListIds.map(id=>MANUFACTURERS.find(m=>m.id===id)).filter(Boolean);
  const prompt=`Compare these manufacturers for a Nordic brand.
Brand category: ${findForm.category||brand?.category||'Skincare & Beauty'}
Target market: ${findForm.targetMarket||brand?.targetMarkets?.[0]||'EU'}
Brand sustainability goals: ${brand?.sustainabilityGoals?.join(', ')||'sustainability-focused'}

Manufacturers:
${items.map((m,i)=>`${i+1}. ${m.name} (${m.city}, ${m.country}) — ${m.type}
   Certs: ${m.certifications.join(', ')} | MOQ: ${m.moq} | Lead: ${m.leadWeeks}w | Sus: ${m.sustainability}`).join('\n')}

Provide:
WINNER: Which manufacturer wins overall and why (2 sentences)
SUSTAINABILITY: Rank by sustainability fit (2-3 sentences)  
MARKET READINESS: Most ready for ${findForm.targetMarket||'target market'} (2 sentences)
COST & SPEED: Compare MOQ, lead time, value (2 sentences)
RECOMMENDATION: Contact order — first, second, third and why (3 bullets)

Use manufacturer names throughout. Be direct.`;
  try{
    const text=await callAPI([{role:"user",content:prompt}],1200);
    compareAiResult=text;
  }catch(e){compareAiResult='Could not generate comparison.';}
  compareAiLoading=false;
  renderFind(document.getElementById('page-find'));
}
