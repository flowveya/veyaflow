<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeyaFlow — Brand Growth Intelligence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0E0E0E;
    --navy: #1E3A5F;
    --gold: #C4A882;
    --cream: #F7F5F0;
    --border: #EDE9E1;
    --muted: #9A9489;
    --green: #10B981;
    --amber: #F59E0B;
    --red: #EF4444;
    --blue: #1E40AF;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
    --mono: 'DM Mono', monospace;
  }

  html, body { height: 100%; background: var(--cream); font-family: var(--sans); color: var(--ink); }

  /* SHELL */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  #sidebar {
    width: 220px; min-width: 220px; background: var(--navy);
    display: flex; flex-direction: column; overflow: hidden;
    transition: width .25s;
  }
  .s-logo { padding: 1.5rem 1.25rem 1rem; border-bottom: 1px solid rgba(255,255,255,.08); }
  .s-logo-text { font-family: var(--serif); font-size: 1.25rem; color: #fff; font-weight: 400; }
  .s-logo-sub { font-family: var(--mono); font-size: .55rem; color: rgba(255,255,255,.3); letter-spacing: .12em; text-transform: uppercase; margin-top: .2rem; }

  .brand-pill {
    margin: .75rem; padding: .6rem .75rem;
    background: rgba(196,168,130,.1); border: 1px solid rgba(196,168,130,.2);
    cursor: pointer; display: none;
  }
  .brand-pill.visible { display: block; }
  .brand-pill-name { font-size: .72rem; color: var(--gold); font-weight: 500; }
  .brand-pill-sub { font-family: var(--mono); font-size: .55rem; color: rgba(255,255,255,.35); margin-top: .15rem; }

  .s-nav { padding: .75rem 0; flex: 1; overflow-y: auto; }
  .nav-item {
    display: flex; align-items: center; gap: .75rem;
    padding: .65rem 1.25rem; cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .15s;
  }
  .nav-item:hover { background: rgba(196,168,130,.08); }
  .nav-item.active { background: rgba(196,168,130,.15); border-left-color: var(--gold); }
  .nav-icon { font-size: .85rem; width: 18px; text-align: center; color: rgba(255,255,255,.4); }
  .nav-item.active .nav-icon { color: var(--gold); }
  .nav-label { font-size: .72rem; color: rgba(255,255,255,.45); letter-spacing: .04em; }
  .nav-item.active .nav-label { color: var(--gold); }
  .nav-badge { font-family: var(--mono); font-size: .5rem; background: var(--red); color: #fff; border-radius: 8px; padding: 1px 5px; margin-left: auto; }

  .s-footer { padding: .85rem 1.25rem; border-top: 1px solid rgba(255,255,255,.08); }
  .s-footer-text { font-family: var(--mono); font-size: .55rem; color: rgba(255,255,255,.25); }

  /* MAIN */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 1.1rem 2rem; display: flex; align-items: center;
    justify-content: space-between; gap: 1rem; flex-shrink: 0;
    position: sticky; top: 0; z-index: 10;
  }
  .page-title { font-family: var(--serif); font-size: 1.35rem; color: var(--navy); font-weight: 400; }
  .page-sub { font-family: var(--mono); font-size: .58rem; color: var(--muted); margin-top: .2rem; letter-spacing: .04em; }

  .content { flex: 1; overflow-y: auto; padding: 1.75rem 2rem; }

  /* REG STRIP */
  .reg-strip {
    background: #FEF3C7; border-bottom: 1px solid #FDE68A;
    padding: .45rem 2rem; display: flex; gap: 1rem; align-items: center;
    flex-wrap: wrap; flex-shrink: 0;
  }
  .reg-strip-label { font-family: var(--mono); font-size: .55rem; color: #92400E; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
  .reg-item { display: flex; align-items: center; gap: .4rem; }
  .reg-days { font-family: var(--mono); font-size: .6rem; font-weight: 700; }
  .reg-name { font-family: var(--sans); font-size: .62rem; color: #78350F; }
  .reg-btn { font-family: var(--mono); font-size: .5rem; padding: .15rem .45rem; background: none; border: 1px solid #D97706; color: #92400E; cursor: pointer; }

  /* CARDS */
  .card {
    background: #fff; border: 1px solid var(--border); padding: 1.25rem 1.5rem;
    margin-bottom: .85rem; box-shadow: 0 1px 4px rgba(0,0,0,.03);
  }
  .card-sm { padding: .85rem 1rem; }

  /* GRID HELPERS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; }
  .col-2 { display: grid; grid-template-columns: 360px 1fr; gap: 1.5rem; align-items: start; }
  .col-filter { display: grid; grid-template-columns: 300px 1fr; gap: 1.5rem; align-items: start; }

  /* STAT CARDS */
  .stat-card { background: #fff; border: 1px solid var(--border); padding: 1rem 1.25rem; border-top: 3px solid currentColor; }
  .stat-num { font-family: var(--serif); font-size: 2rem; line-height: 1; }
  .stat-label { font-family: var(--mono); font-size: .6rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-top: .3rem; }

  /* FORMS */
  .field { margin-bottom: 1rem; }
  label.lbl { display: block; font-family: var(--mono); font-size: .62rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #333; margin-bottom: .35rem; }
  input[type=text], input[type=number], input[type=email], select, textarea {
    width: 100%; padding: .7rem .9rem; border: 1px solid #DDD;
    background: var(--cream); font-family: var(--sans); font-size: .9rem;
    color: var(--ink); outline: none; appearance: none; resize: vertical;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--navy); }

  /* BUTTONS */
  .btn-primary {
    padding: .8rem 1.5rem; background: var(--navy); border: none; color: #fff;
    font-family: var(--mono); font-size: .7rem; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase; cursor: pointer;
    width: 100%; transition: opacity .15s;
  }
  .btn-primary:hover:not(:disabled) { opacity: .88; }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
  .btn-outline {
    padding: .5rem .9rem; background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: var(--mono); font-size: .62rem;
    letter-spacing: .06em; cursor: pointer;
  }
  .btn-outline:hover { border-color: var(--navy); color: var(--navy); }
  .btn-gold {
    padding: .6rem 1.2rem; background: var(--gold); border: none; color: #fff;
    font-family: var(--mono); font-size: .65rem; font-weight: 600;
    letter-spacing: .06em; cursor: pointer;
  }

  /* TAGS */
  .tag { font-family: var(--mono); font-size: .55rem; padding: .15rem .45rem; white-space: nowrap; }
  .tag-green { background: #ECFDF5; color: #065F46; }
  .tag-blue  { background: #EFF6FF; color: var(--blue); }
  .tag-amber { background: rgba(245,158,11,.1); color: #92400E; }
  .tag-red   { background: rgba(239,68,68,.08); color: #991B1B; }
  .tag-gray  { background: #F7F5F0; color: #6B6358; }
  .tag-purple{ background: #F5F3FF; color: #5B21B6; }

  /* PROGRESS BAR */
  .progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill  { height: 100%; border-radius: 3px; transition: width .4s; }

  /* SPINNER */
  .spinner {
    width: 32px; height: 32px; border: 2px solid var(--border);
    border-top-color: var(--navy); border-radius: 50%;
    animation: spin .9s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* PROSE */
  .prose { font-family: var(--sans); font-size: .83rem; color: #333; line-height: 1.85; }

  /* SECTION TAG */
  .section-tag { font-family: var(--mono); font-size: .58rem; letter-spacing: .15em; text-transform: uppercase; color: var(--gold); margin-bottom: .4rem; }

  /* ONBOARDING */
  .onboard-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; overflow-y: auto; }
  .onboard-inner { width: 100%; max-width: 520px; }
  .onboard-title { font-family: var(--serif); font-size: 1.4rem; color: var(--navy); margin-bottom: .35rem; }
  .onboard-sub { font-family: var(--sans); font-size: .8rem; color: var(--muted); margin-bottom: 1.25rem; }
  .stage-option {
    padding: .9rem 1rem; border: 1px solid var(--border); background: var(--cream);
    cursor: pointer; display: flex; gap: .85rem; align-items: center;
    margin-bottom: .5rem; transition: all .15s;
  }
  .stage-option.selected { border-color: var(--navy); background: #EFF6FF; }
  .stage-option-icon { font-size: 1rem; color: var(--muted); }
  .stage-option.selected .stage-option-icon { color: var(--navy); }
  .stage-option-name { font-family: var(--sans); font-size: .85rem; font-weight: 500; color: #333; }
  .stage-option.selected .stage-option-name { color: var(--navy); }
  .stage-option-desc { font-family: var(--sans); font-size: .7rem; color: var(--muted); margin-top: .1rem; }
  .market-chip {
    padding: .3rem .7rem; border: 1px solid var(--border); background: none;
    font-family: var(--mono); font-size: .62rem; color: var(--muted);
    cursor: pointer; transition: all .15s; display: inline-block; margin: .2rem;
  }
  .market-chip.selected { background: var(--navy); border-color: var(--navy); color: #fff; }
  .goal-chip {
    padding: .55rem .75rem; border: 1px solid var(--border); background: var(--cream);
    font-family: var(--sans); font-size: .72rem; color: #555;
    cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: .5rem;
  }
  .goal-chip.selected { border-color: var(--green); background: rgba(16,185,129,.07); color: #065F46; }
  .goal-chip-check { color: var(--border); }
  .goal-chip.selected .goal-chip-check { color: var(--green); }
  .cat-option {
    padding: .7rem .85rem; border: 1px solid var(--border); background: var(--cream);
    font-family: var(--sans); font-size: .8rem; color: #333;
    cursor: pointer; transition: all .15s;
  }
  .cat-option.selected { border-color: var(--navy); background: #EFF6FF; color: var(--navy); }

  /* DASHBOARD */
  .next-step-card {
    display: flex; gap: .75rem; align-items: center; padding: .75rem 1rem;
    background: #fff; border: 1px solid var(--border); cursor: pointer;
    transition: border-color .15s; margin-bottom: .5rem;
  }
  .next-step-card:hover { border-color: var(--navy); }
  .next-step-icon { color: var(--gold); font-size: .9rem; flex-shrink: 0; }
  .next-step-name { font-family: var(--sans); font-size: .82rem; color: var(--navy); font-weight: 500; }
  .next-step-desc { font-family: var(--sans); font-size: .68rem; color: var(--muted); margin-top: .1rem; }

  /* REPORT */
  .report-header { background: var(--navy); padding: 1.5rem 2rem; }
  .report-badge { font-family: var(--mono); font-size: .55rem; letter-spacing: .15em; text-transform: uppercase; color: var(--gold); margin-bottom: .4rem; }
  .report-brand { font-family: var(--serif); font-size: 1.6rem; color: #fff; font-weight: 400; margin-bottom: .2rem; }
  .report-meta { font-family: var(--sans); font-size: .7rem; color: rgba(255,255,255,.45); margin-bottom: 1rem; }
  .report-meta-row { display: flex; gap: 2rem; border-top: 1px solid rgba(255,255,255,.12); padding-top: .85rem; flex-wrap: wrap; }
  .report-meta-lbl { font-family: var(--mono); font-size: .52rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.3); margin-bottom: .2rem; }
  .report-meta-val { font-size: .82rem; color: #fff; }
  .report-section { border-bottom: 1px solid var(--border); padding: 1.5rem 1.5rem 1.5rem 1.25rem; }
  .report-section:last-child { border-bottom: none; }
  .report-section-num { font-family: var(--mono); font-size: .55rem; color: var(--gold); }
  .report-section-title { font-family: var(--serif); font-size: 1.05rem; color: var(--navy); margin: .2rem 0 .65rem; }

  /* SUPPLIERS */
  .supplier-row { border-bottom: 1px solid var(--border); padding: .85rem 0; }
  .risk-bar-track { height: 4px; background: var(--border); border-radius: 2px; margin-top: .25rem; overflow: hidden; }

  /* PITCH */
  .retailer-card {
    padding: .85rem 1rem; border: 1px solid var(--border); background: var(--cream);
    cursor: pointer; margin-bottom: .5rem; transition: all .15s;
  }
  .retailer-card.selected { border-color: var(--navy); background: #EFF6FF; }
  .email-box { font-family: var(--sans); font-size: .85rem; color: #333; line-height: 1.9; white-space: pre-wrap; background: var(--cream); border: 1px solid var(--border); padding: 1.25rem; }

  /* FIND */
  .mfr-card { background: #fff; border: 1px solid var(--border); border-left-width: 3px; padding: 1.1rem 1.25rem; margin-bottom: .75rem; }
  .compare-table { width: 100%; border-collapse: collapse; font-size: .78rem; }
  .compare-table th { padding: .75rem 1rem; text-align: left; background: var(--navy); color: rgba(255,255,255,.5); font-family: var(--mono); font-size: .58rem; letter-spacing: .08em; font-weight: normal; }
  .compare-table th.mfr-name { color: #fff; font-size: .78rem; font-family: var(--sans); font-weight: 500; }
  .compare-table td { padding: .6rem 1rem; vertical-align: top; border-bottom: 1px solid var(--border); }
  .compare-table tr:nth-child(even) td { background: var(--cream); }
  .compare-table td.row-label { font-family: var(--mono); font-size: .58rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }

  /* CIRCULAR */
  .espr-banner { padding: .6rem .85rem; margin-bottom: 1rem; }
  .espr-red  { background: #FEF2F2; border: 1px solid #FECACA; }
  .espr-amber{ background: #FFFBEB; border: 1px solid #FDE68A; }
  .espr-green{ background: #F0FDF4; border: 1px solid #BBF7D0; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 3rem 2rem; color: var(--muted); }
  .empty-title { font-family: var(--serif); font-size: 1.2rem; font-style: italic; color: var(--navy); margin-bottom: .5rem; }
  .empty-sub { font-family: var(--sans); font-size: .8rem; line-height: 1.7; max-width: 340px; margin: 0 auto; }

  /* SECTION HEADER in analysis */
  .analysis-section { margin-bottom: .75rem; padding-left: .75rem; border-left: 2px solid; }
  .analysis-label { font-family: var(--mono); font-size: .58rem; font-weight: 600; margin-bottom: .2rem; }
  .analysis-text { font-family: var(--sans); font-size: .78rem; color: #444; line-height: 1.7; }

  /* PAGE VISIBILITY */
  .page { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
  .page.active { display: flex; }

  /* PROGRESS BAR TOP */
  .progress-top { height: 3px; background: var(--border); flex-shrink: 0; }
  .progress-top-fill { height: 100%; background: var(--gold); transition: width .3s; }

  /* COMPARE TOGGLE */
  .compare-btn {
    padding: .3rem .6rem; font-family: var(--mono); font-size: .55rem;
    border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer;
    transition: all .15s;
  }
  .compare-btn.active { background: var(--navy); border-color: var(--navy); color: #fff; }

  /* CHIPS */
  .chips { display: flex; flex-wrap: wrap; gap: .3rem; }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  /* SAVED REPORT ROW */
  .saved-report {
    border: 1px solid var(--border); border-left: 3px solid var(--navy);
    padding: .85rem 1rem; margin-bottom: .5rem; cursor: pointer; background: #fff;
  }
  .saved-report-meta { font-family: var(--mono); font-size: .55rem; color: var(--gold); margin-bottom: .2rem; }
  .saved-report-name { font-size: .88rem; color: var(--navy); }
  .saved-report-date { font-family: var(--sans); font-size: .62rem; color: var(--muted); margin-top: .15rem; }

  /* PROFILE TABLE */
  .profile-row { display: grid; grid-template-columns: 120px 1fr; gap: .5rem; padding: .5rem 0; border-bottom: 1px solid #F0EDE8; }
  .profile-label { font-family: var(--mono); font-size: .58rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; align-self: center; }
  .profile-val { font-family: var(--sans); font-size: .8rem; color: #333; }

  /* NAV BANNER */
  .nav-banner {
    background: var(--navy); padding: 1rem 1.5rem;
    margin-bottom: 1.5rem; display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: .75rem;
  }
  .nav-banner-title { font-family: var(--serif); font-size: 1.05rem; color: #fff; }
  .nav-banner-sub { font-family: var(--mono); font-size: .55rem; color: var(--gold); margin-bottom: .3rem; }
  .nav-banner-btn {
    padding: .55rem .9rem; background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.2); color: #fff;
    font-family: var(--mono); font-size: .62rem; cursor: pointer; letter-spacing: .04em;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 680px) {
    #sidebar { display: none; }
    #app { flex-direction: column; }
    #main { flex: 1; min-height: 0; }

    .content { padding: 1rem; padding-bottom: 5rem; }
    .topbar { padding: .85rem 1rem; flex-wrap: wrap; gap: .5rem; }
    .page-title { font-size: 1.1rem; }

    /* Collapse all grids to single column */
    .grid-2, .grid-3, .grid-4, .col-2, .col-filter { grid-template-columns: 1fr !important; }

    /* Stats: 2 columns on mobile */
    .grid-4 { grid-template-columns: 1fr 1fr !important; gap: .5rem !important; }

    .card { padding: .85rem 1rem; }
    .nav-banner { padding: .85rem 1rem; flex-direction: column; align-items: flex-start; gap: .6rem; }
    .nav-banner-btn { font-size: .6rem; padding: .45rem .7rem; }
    .report-header { padding: 1rem; }
    .report-brand { font-size: 1.2rem; }
    .report-meta-row { gap: .85rem; }
    .onboard-wrap { padding: 1rem; align-items: flex-start; }
    .email-box { font-size: .8rem; }
    .compare-table { font-size: .7rem; }
    .compare-table th, .compare-table td { padding: .5rem .65rem; }

    /* Reg strip: horizontal scroll */
    .reg-strip { flex-wrap: nowrap; overflow-x: auto; gap: .85rem; padding: .4rem 1rem; }

    /* Jump nav: horizontal scroll */
    #section-jump { overflow-x: auto; flex-wrap: nowrap !important; }
  }

  /* MOBILE BOTTOM NAV */
  #mobile-nav {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--navy); border-top: 1px solid rgba(255,255,255,.1);
    z-index: 100; padding-bottom: env(safe-area-inset-bottom);
  }
  #mobile-nav::after {
    content: ''; position: absolute; right: 0; top: 0; bottom: 0;
    width: 28px; pointer-events: none;
    background: linear-gradient(to right, transparent, rgba(30,58,95,.9));
  }
  #mobile-nav-inner {
    display: flex; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #mobile-nav-inner::-webkit-scrollbar { display: none; }
  .mob-nav-item {
    display: flex; flex-direction: column; align-items: center;
    padding: .45rem .4rem .35rem; cursor: pointer; min-width: 52px;
    flex-shrink: 0; position: relative; transition: background .15s;
  }
  .mob-nav-item.active { background: rgba(196,168,130,.15); }
  .mob-nav-icon { font-size: .8rem; color: rgba(255,255,255,.4); line-height: 1; }
  .mob-nav-item.active .mob-nav-icon { color: var(--gold); }
    .mob-nav-label { font-family: var(--mono); font-size: .42rem; color: rgba(255,255,255,.4); margin-top: .1rem; letter-spacing: .03em; text-transform: uppercase; white-space: nowrap; }
  .mob-nav-item.active .mob-nav-label { color: var(--gold); }
  .mob-badge { position: absolute; top: .35rem; right: .6rem; background: var(--red); color: #fff; border-radius: 8px; padding: 1px 4px; font-family: var(--mono); font-size: .42rem; }

  /* Mobile header */
  #mobile-header {
    display: none;
    background: var(--navy); padding: .75rem 1rem;
    flex-shrink: 0; align-items: center; justify-content: space-between;
  }
  .mob-header-title { font-family: var(--serif); font-size: 1rem; color: #fff; }
  .mob-header-sub { font-family: var(--mono); font-size: .52rem; color: rgba(255,255,255,.35); margin-top: .1rem; }
  .mob-header-brand { font-family: var(--mono); font-size: .58rem; color: var(--gold); text-align: right; cursor: pointer; }

  @media (max-width: 680px) {
    #mobile-nav { display: flex; }
    #mobile-header { display: flex; }
  }
</style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div id="app">
  <!-- MOBILE HEADER -->
  <div id="mobile-header">
    <div>
      <div class="mob-header-title">VeyaFlow</div>

function calcRisk(s){
  let sc=0;
  sc+=Math.min(s.missing.length*1.2,6);
  if(s.eudrScope)sc+=2;
  const cr=COUNTRY_RISK[s.country]||"MEDIUM";
  if(cr==="HIGH")sc+=2; else if(cr==="MEDIUM")sc+=1;
  if(s.tier===3)sc+=1;
  if(s.status==="overdue")sc+=1;
  if((s.certifications||[]).length===0)sc+=0.5;
  if(s.auditOverdue)sc+=1;
  return Math.min(Math.round(sc*10)/10,10);
}

function calcSusScore(m){return Math.min(m.certifications.reduce((a,c)=>a+(CERT_SCORES[c]||0),0),20);}
function calcReadiness(m,market){
  if(!market||!MARKET_REQS[market])return null;
  const reqs=MARKET_REQS[market];
  const met=reqs.filter(r=>m.markets.includes(market)||m.certifications.some(c=>c.toLowerCase().includes(r.split(" ")[0].toLowerCase())));
  return Math.round((met.length/reqs.length)*100);
}

async function callAPI(messages,maxTokens=1200){
  let res;
  try{
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 24000); // 24s timeout
    res=await fetch("/.netlify/functions/anthropic-proxy",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:maxTokens,messages}),
      signal:controller.signal
    });
    clearTimeout(timeout);
  }catch(networkErr){
    if(networkErr.name==='AbortError') throw new Error("Request timed out after 24 seconds. Try again — the report generates in 4 steps and each step should complete within 10 seconds.");
    throw new Error("Connection error. Check your internet connection and try again.");
  }
  if(res.status===401)throw new Error("401 — API key missing. Deploy via Netlify proxy.");
  if(res.status===504)throw new Error("504 — Request timed out. Your Netlify plan may need upgrading, or try again in a moment.");
  if(res.status===529)throw new Error("529 — AI overloaded. Try again in a moment.");
  if(!res.ok)throw new Error("API error "+res.status);
  const d=await res.json();
  return(d.content||[]).map(b=>b.text||"").join("");
}

function getVisibleNav(){
  const stage = brand?.stage || 'trading';
  const cat = brand?.category || null;
  return NAV.filter(function(n){

    if(n.cats && cat && !n.cats.includes(cat)) return false;

function daysUntil(d){return Math.max(0,Math.round((new Date(d)-new Date())/(1000*60*60*24)));}
function renderRegStrip(){
  const strip=document.getElementById('reg-strip');
  if(!brand){strip.style.display='none';return;}
  const relevant=REG_DEADLINES.filter(r=>!r.cat||r.cat.includes(brand.category)).slice(0,3);
  if(!relevant.length){strip.style.display='none';return;}
  strip.style.display='flex';
  strip.innerHTML=`<span class="reg-strip-label">⚠ Upcoming deadlines</span>`+
    relevant.map(r=>{
      const d=daysUntil(r.deadline);
      const color=d<90?'#EF4444':d<180?'#F59E0B':'#1E3A5F';
      return `<div class="reg-item"><span class="reg-days" style="color:${color}">${d}d</span><span class="reg-name">${r.title}</span><button class="reg-btn" onclick="showPage('${r.link}')">→</button></div>`;
    }).join('');
}

═══════════════════════════════════════════════════ */
function renderPage(id){
  const el=document.getElementById('page-'+id);
  if(!el)return;
  if(id==='home')renderHome(el);
  else if(id==='find')renderFind(el);
  else if(id==='report')renderReport(el);
  else if(id==='compare')renderCompare(el);
  else if(id==='pitch')renderPitch(el);
  else if(id==='brandpack')renderBrandPack(el);
  else if(id==='bizcase')renderBizCase(el);
  else if(id==='suppliers')renderSuppliers(el);
  else if(id==='circular')renderCircular(el);
  else if(id==='skus')renderSkus(el);
  else if(id==='claims')renderClaims(el);
  else if(id==='cfo')renderCFO(el);
}

function toggleTarget(m){
  const i=onboardForm.targetMarkets.indexOf(m);
  if(i>=0)onboardForm.targetMarkets.splice(i,1);
  else onboardForm.targetMarkets.push(m);
  renderOnboardStep();
}
function toggleGoal(g){
  const i=onboardForm.sustainabilityGoals.indexOf(g);
  if(i>=0)onboardForm.sustainabilityGoals.splice(i,1);
  else onboardForm.sustainabilityGoals.push(g);
  renderOnboardStep();
}
function renderProofSummary(){

function bindReportForm(){
  const fields=['brandName','brandDesc','category','skus','currentMarket','targetMarket','pricePoint'];
  fields.forEach(f=>{
    const el=document.getElementById('r-'+f);
    if(el){
      el.addEventListener('input',()=>{
        reportForm[f]=el.value;
        updateReportBtn();
      });
      el.addEventListener('change',()=>{
        reportForm[f]=el.value;
        updateReportBtn();
      });
    }
  });
  updateReportBtn();
}

function updateReportBtn(){
  const btn=document.getElementById('r-generate-btn');
  if(btn) btn.disabled=!reportForm.brandName||!reportForm.category||!reportForm.targetMarket;
}

// Filters registry to ~2,000 tokens of relevant intel before each API call
// Prevents context window bloat as registry grows to 80+ retailers
function getRelevantIntel(category, marketName, preferredRetailerName) {
  const marketId = Object.entries(MARKET_REGISTRY)
    .find(([,v])=>v.name===marketName)?.[0];

  const marketProfile = marketId ? MARKET_REGISTRY[marketId] : null;

  // Get relevant retailers: preferred first, then category+market matches
  const categoryMatrixEntry = CATEGORY_MARKET_MATRIX
    .find(cm => cm.category===category && cm.market===marketId);
  const relevantIds = categoryMatrixEntry?.retailerIds || [];
  const distributors = categoryMatrixEntry?.distributors || 'Major local distributors';

  const retailers = RETAILER_REGISTRY.filter(r =>
    r.market === marketId &&
    (relevantIds.includes(r.id) || r.categories.includes(category))
  ).slice(0, 4); // max 4 retailers in prompt context

  // Format for prompt injection — compact but complete
  const formattedRetailers = retailers.map(r => `
${r.name} (${r.marketName}) — ${r.type} — ${r.storeCount} stores — Verified: ${r.verifiedBy} ${r.verifiedDate}
Strategy: ${r.strategy2026}
Margin: ${Math.round(r.marginMin*100)}-${Math.round(r.marginMax*100)}% | MOQ: ${r.moq} units | Range review: ${r.rangeReviewCycle.join(', ')}
Non-negotiable: ${r.nonNegotiable}
Flex: ${r.flex}
Insider: ${r.insiderNote}
Phase 1 stores: ${r.flagshipStores.join(' + ')}
Rationale: ${r.flagshipRationale}
Approach: ${r.approachRoute}`).join('\n---\n');

  const flagshipStores = retailers.length > 0 ? {
    phase1: retailers[0].flagshipStores,
    rationale: retailers[0].flagshipRationale,
  } : {phase1:[`Key flagship in ${marketName}`], rationale:'Select highest-footfall locations.'};

  const timingHook = marketProfile?.timingHook2026 ||
    `Research current 2026 market conditions in ${marketName}.`;

  const negIntel = retailers.map(r =>
    `${r.name}: Non-neg: ${r.nonNegotiable} | Flex: ${r.flex} | Insider: ${r.insiderNote}`
  ).join('\n');

  return {
    marketProfile, retailers, formattedRetailers,
    flagshipStores, timingHook, negIntel, distributors,
    categoryRetailers: retailers.map(r=>r.name).join(', '),
    retailerIntel: formattedRetailers,
  };
}

function parseMarkdown(text){
  if(!text) return '';
  var t = text;
  // Headers
  t = t.replace(/^#### (.+)$/gm,'<h4 style="font-family:var(--sans);font-size:.82rem;font-weight:700;color:var(--navy);margin:1rem 0 .3rem">$1</h4>');
  t = t.replace(/^### (.+)$/gm,'<h3 style="font-family:var(--sans);font-size:.88rem;font-weight:700;color:var(--navy);margin:1.1rem 0 .35rem">$1</h3>');
  t = t.replace(/^## (.+)$/gm,'<h2 style="font-family:var(--serif);font-size:1rem;font-weight:400;color:var(--navy);margin:1.25rem 0 .4rem;padding-bottom:.25rem;border-bottom:1px solid var(--border)">$1</h2>');
  t = t.replace(/^# (.+)$/gm,'<h2 style="font-family:var(--serif);font-size:1.05rem;font-weight:400;color:var(--navy);margin:1.25rem 0 .4rem">$1</h2>');
  // Bold and italic
  t = t.replace(/\*\*([^*]+?)\*\*/g,'<strong style="color:var(--navy)">$1</strong>');
  t = t.replace(/\*([^*]+?)\*/g,'<em>$1</em>');
  // Horizontal rules
  t = t.replace(/^---+$/gm,'<hr style="border:none;border-top:1px solid var(--border);margin:.75rem 0">');
  // Status badges
  t = t.replace(/\bSTRONG FIT\b/g,'<span style="display:inline-block;background:#ECFDF5;color:#065F46;font-family:var(--mono);font-size:.65rem;font-weight:700;padding:.1rem .5rem;border:1px solid #A7F3D0">STRONG FIT</span>');
  t = t.replace(/\bPOSSIBLE FIT\b/g,'<span style="display:inline-block;background:#FFFBEB;color:#92400E;font-family:var(--mono);font-size:.65rem;font-weight:700;padding:.1rem .5rem;border:1px solid #FCD34D">POSSIBLE FIT</span>');
  t = t.replace(/\bNOT YET\b/g,'<span style="display:inline-block;background:#FEF2F2;color:#991B1B;font-family:var(--mono);font-size:.65rem;font-weight:700;padding:.1rem .5rem;border:1px solid #FCA5A5">NOT YET</span>');
  t = t.replace(/\bSTRONG FIT\b/g,'<span style="display:inline-block;background:#ECFDF5;color:#065F46;font-family:var(--mono);font-size:.65rem;font-weight:700;padding:.1rem .5rem">STRONG FIT</span>');
  t = t.replace(/\bCRITICAL\b/g,'<span style="display:inline-block;background:#FEF2F2;color:#991B1B;font-family:var(--mono);font-size:.6rem;font-weight:700;padding:.1rem .4rem">CRITICAL</span>');
  t = t.replace(/\bIMPORTANT\b/g,'<span style="display:inline-block;background:#FFFBEB;color:#92400E;font-family:var(--mono);font-size:.6rem;font-weight:700;padding:.1rem .4rem">IMPORTANT</span>');
  // Score badges
  t = t.replace(/([\d.]+)\/10/g,'<span style="display:inline-block;background:var(--navy);color:var(--gold);font-family:var(--mono);font-size:.85rem;font-weight:700;padding:.1rem .4rem">$1/10</span>');
  // Bullet points
  t = t.replace(/^[-*] (.+)$/gm,'<div style="display:flex;gap:.5rem;padding:.2rem 0"><span style="color:var(--gold);flex-shrink:0;font-weight:700">&#8211;</span><span>$1</span></div>');
  // Numbered list items
  t = t.replace(/^(\d+)\. (.+)$/gm,'<div style="display:flex;gap:.5rem;padding:.2rem 0"><span style="color:var(--navy);flex-shrink:0;font-family:var(--mono);font-size:.75rem;font-weight:700;min-width:1.2rem">$1.</span><span>$2</span></div>');
  // Table rows — convert | col | col | to styled rows
  t = t.replace(/^\|(.+)\|$/gm, function(match, inner){
    var cells = inner.split('|').map(function(c){ return c.trim(); });
    if(cells.every(function(c){ return /^[-: ]+$/.test(c); })) return '';
    return '<div style="display:grid;grid-template-columns:repeat('+cells.length+',1fr);border-bottom:1px solid var(--border)">' +
      cells.map(function(c,i){
        var val = c||'';
        var isEmpty = val.trim()==='';
        return '<div style="padding:.4rem .6rem;font-family:var(--sans);font-size:.78rem;'+(i===0?'font-weight:600;color:var(--navy)':'color:#333')+(isEmpty?';color:#bbb;font-style:italic':'')+'">'+(isEmpty?'—':val)+'</div>';
      }).join('') + '</div>';
  });
  // Paragraph breaks
  t = t.replace(/\n\n/g,'</p><p style="margin:.5rem 0">');
  t = t.replace(/\n/g,'<br>');
  return t;
}

async function generateBizCase(){
  if(!bizCaseState.retailer){alert('Select a retailer first.');return;}
  bizCaseState.generating=true;
  renderBizCase(document.getElementById('page-bizcase'));

  const retailer = bizCaseState.retailer;
  const market = bizCaseState.market||'Denmark';
  const mode = bizCaseState.mode||'catman';
  const heroSku = skus.length>0?skus[0]:null;
  const intel = getRelevantIntel(brand.category||'Skincare & Beauty', market, retailer);
  const retailerEntry = intel.retailers.find(r=>r.name===retailer)||intel.retailers[0]||{};

  // Pre-calculate P&L — injected as verified facts
  const rspNum = parseFloat(heroSku?.rspSEK||0);
  const cogsNum = parseFloat(heroSku?.exWorksCost||0);
  const marginPct = retailerEntry.marginMin ? (retailerEntry.marginMin+retailerEntry.marginMax)/2 : 0.50;
  const revenuePerUnit = rspNum * (1-marginPct);
  const projUnits = 4200; // Y1 benchmark
  const grossRevY1 = revenuePerUnit * projUnits;
  const beautyDaysFee = retailer==='Matas'?15000:retailer==='Lyko'?8000:12000;
  const logisticsFee = 8000;
  const netRevY1 = grossRevY1 - beautyDaysFee - logisticsFee;
  const linearMeters = 1.5;
  const spaceProductivity = netRevY1 / linearMeters;
  const benchmarkData = SPACE_BENCHMARKS[retailer]||(SPACE_BENCHMARKS.default);
  const benchmark = benchmarkData[brand.category||'Skincare & Beauty']||benchmarkData.default||350000;
  const benchCurrency = benchmarkData.currency||'SEK';
  const premiumToBench = benchmark>0 ? ((spaceProductivity-benchmark)/benchmark*100).toFixed(0) : 'N/A';
  const marginContribPerUnit = rspNum>0 ? (revenuePerUnit - cogsNum) : 0;
  const breakEvenUnits = (beautyDaysFee+logisticsFee)>0&&marginContribPerUnit>0 ? Math.ceil((beautyDaysFee+logisticsFee)/marginContribPerUnit) : 0;
  const breakEvenMonth = breakEvenUnits>0 ? Math.ceil(breakEvenUnits/(projUnits/12)) : 0;

  const plTable = rspNum>0 ? `
PRE-CALCULATED P&L — INJECT AS VERIFIED DATA (do not recalculate or estimate differently):
RSP: ${rspNum} SEK | Retailer margin: ${Math.round(marginPct*100)}% | Revenue per unit: ${revenuePerUnit.toFixed(0)} SEK
Projected Y1 units: ${projUnits.toLocaleString()} | Gross revenue contribution: ${Math.round(grossRevY1).toLocaleString()} SEK
Less Beauty Days/promo fee: -${beautyDaysFee.toLocaleString()} SEK
Less logistics levy: -${logisticsFee.toLocaleString()} SEK
Net revenue contribution Y1: ${Math.round(netRevY1).toLocaleString()} SEK
Space allocation: ${linearMeters}m | Space productivity: ${Math.round(spaceProductivity).toLocaleString()} ${benchCurrency}/metre/year
Category benchmark: ${benchmark.toLocaleString()} ${benchCurrency}/metre/year | Premium to benchmark: ${premiumToBench}%
${breakEvenMonth>0?`Break-even: Month ${breakEvenMonth}`:'Enter COGS in My Products for break-even calculation'}
CONFIDENCE: HIGH — calculated from brand-verified inputs` : 'RSP not set — use category benchmarks for financial estimates. Flag all numbers as estimates.';

  // Risk table
  const risks = (BIZ_CASE_RISKS[retailer]||BIZ_CASE_RISKS.default).slice(0,5);
  const riskTable = risks.map(r=>`${r.risk} | ${r.prob}% probability | Impact: ${r.impact} | Mitigation: ${r.mitigation}`).join('\n');

  // Cannibalisation data
  const cannibEntry = (CANNIB_DATA[retailer]||{})[brand.category||'Skincare & Beauty'];
  const cannibData = cannibEntry ?
    `CANNIBALISATION DATA (use these facts):\nNearest current SKUs at ${retailer}: ${cannibEntry.nearestSkus.join(', ')}\nEstimated consumer overlap: ${cannibEntry.overlapPct}%\nAssessment: ${brand.name} ${cannibEntry.assessment}\nCannibalisation risk: ${cannibEntry.risk}` :
    `Cannibalisation risk: assess based on current ${retailer} assortment in ${brand.category} category. Identify 2-3 nearest SKUs and estimate overlap.`;

  // Range review dates for listing proposal
  const rangeReview = retailerEntry.rangeReviewCycle?.join(' or ')||'upcoming range review';
  const deadlineDate = retailer==='Matas'?'May 8 2026':retailer==='Lyko'?'Rolling — apply now':retailer==='Boots UK'?'May 15 2026':'April 30 2026';

  const catmanPrompt = `You are writing an internal listing approval document for a category manager at ${retailer}, ${market}. This is NOT a pitch — it is a pre-built justification for the category manager to present upward to their director. April 2026.

BRAND: ${brand.name} | CATEGORY: ${brand.category} | USP: ${brand.usp||''}
TARGET RETAILER: ${retailer} | MARKET: ${market}

${plTable}

${cannibData}

RISKS (hardcoded probabilities — do not change):
${riskTable}

RETAILER CONTEXT:
${retailerEntry.strategy2026||intel.negIntel.slice(0,200)}
Range review: ${rangeReview}

Generate a 5-section Retail Business Case in EXACTLY this structure:

## THE CATEGORY OPPORTUNITY
Open with a one-paragraph statement of the category GAP at ${retailer} — NOT the brand's strengths. 
Format: "[Retailer] currently has no [specific gap]. The [segment] occupies [X] bays with [Y] SKUs — none with [positioning]. This gap represents an estimated [Z] incremental revenue opportunity."
Introduce ${brand.name} as the solution ONLY after stating the gap.
Reference the retailer's 2026 strategy: ${retailerEntry.strategy2026?.slice(0,150)||''}

## COMMERCIAL MODEL

  const buyerPrompt = `You are writing a Retail Business Case for a buyer at ${retailer}, ${market}. April 2026. Shorter format — first contact justification.

BRAND: ${brand.name} | CATEGORY: ${brand.category} | USP: ${brand.usp||''}

${plTable}

PROOF POINTS: ${[brand.revenueGrowth?'+'+brand.revenueGrowth+'% YoY':null,brand.unitsSold?brand.unitsSold+' units':null,brand.repeatRate?brand.repeatRate+'% repeat':null,brand.reviewScore?brand.reviewScore+' avg review':null].filter(Boolean).join(' | ')||'[Add proof points in Brand Profile]'}

Generate a 5-section business case for a buyer. Sections:
## BRAND & CATEGORY FIT
## COMMERCIAL PROOF
## HIDDEN ECONOMICS
## ROUTINE INTEGRATION
## NEXT STEPS
Under 500 words. More brand-story led. Buyer needs to feel excited, not just rationally convinced.`;

  const prompt = mode==='catman' ? catmanPrompt : buyerPrompt;

  try{
    const text = await callAPI([{role:'user',content:prompt}],1400);
    bizCaseState.result=text;
    bizCaseState.generating=false;
    bizCaseState.timestamp=new Date().toISOString();
  }catch(err){
    bizCaseState.generating=false;
    bizCaseState.result='ERROR:'+err.message;
  }
  renderBizCase(document.getElementById('page-bizcase'));
}

function renderBrandPackResult(){
  if(!brandPackState.result) return '';
  const isError = brandPackState.result.startsWith('ERROR:');
  if(isError) return `<div style="color:var(--red);padding:1rem;background:#FEF2F2;font-family:var(--sans);font-size:.82rem">${brandPackState.result.replace('ERROR:','')}</div>`;

  // Parse sections
  const raw = brandPackState.result;
  const sections = raw.split(/^##\s/m).filter(s=>s.trim());

  return `
    <div style="border:2px solid var(--navy);margin-bottom:1rem">
      <!-- Header -->
      <div style="background:var(--navy);padding:1.25rem 1.5rem;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.75rem">
        <div>
          <div style="font-family:var(--serif);font-size:1.3rem;color:#fff;margin-bottom:.2rem">${brand.name}</div>
          <div style="font-family:var(--mono);font-size:.6rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase">${brand.category} · Brand Pack for ${brandPackState.retailer}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--mono);font-size:.55rem;color:var(--gold);letter-spacing:.08em">◫ VEYAFLOW VERIFIED</div>
          <div style="font-family:var(--mono);font-size:.5rem;color:rgba(255,255,255,.4);margin-top:.15rem">${new Date().toLocaleDateString('en-GB',{month:'short',year:'numeric'})}</div>
        </div>
      </div>

      <!-- Sections -->
      <div style="padding:1.25rem 1.5rem">
        ${sections.map(section=>{
          const lines = section.split('\n');
          const title = lines[0].trim();
          const body = lines.slice(1).join('\n').trim();
          const formatted = body
            .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
            .replace(/^[-•] (.+)$/gm,'<div style="padding:.3rem 0 .3rem 1rem;border-left:2px solid var(--gold);margin:.2rem 0;font-family:var(--sans);font-size:.8rem;line-height:1.6">$1</div>')
            .replace(/\n\n/g,'</p><p style="margin:.5rem 0">')
            .replace(/\n/g,'<br>');
          return `
            <div style="margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)">
              <div style="font-family:var(--mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--navy);font-weight:700;margin-bottom:.5rem">${title}</div>
              <div style="font-family:var(--sans);font-size:.82rem;line-height:1.7;color:#333"><p style="margin:.5rem 0">${formatted}</p></div>
            </div>
          `;
        }).join('')}
      </div>

      <!-- Footer -->
      <div style="background:var(--navy);padding:.85rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
        <div style="font-family:var(--mono);font-size:.55rem;color:rgba(255,255,255,.5)">Generated by VeyaFlow · veyaflow.com · ${new Date().toLocaleDateString('en-GB')}</div>
        <div style="font-family:var(--mono);font-size:.55rem;color:var(--gold)">◫ Full compliance documentation available on request</div>
      </div>
    </div>

    <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.5rem">
      <button class="btn-primary" onclick="window.print()" style="flex:1">Print / Save as PDF ↓</button>
      <button class="btn-outline" onclick="brandPackState.result=null;brandPackState.retailer='';renderBrandPack(document.getElementById('page-brandpack'))" style="flex:0 0 auto">Generate another →</button>
    </div>

    <div style="background:#FFFBEB;border:1px solid #D97706;padding:.85rem 1rem;font-family:var(--sans);font-size:.75rem;color:#92400E;line-height:1.6">
      <strong>💡 Tip:</strong> To save as PDF — click Print, then select "Save as PDF" as the destination. The Brand Pack is formatted to print cleanly on A4.
    </div>
  `;
}

function sanitiseSkuForRetailer(sku){
  if(!sku) return {};
  const safe = {};
  RETAILER_SAFE_FIELDS.forEach(function(k){
    if(sku[k]!==undefined) safe[k] = sku[k];
  });
  return safe;
}

// Verify no private data in a prompt string (dev safety check)
function assertNoPrivateData(str){
  const leaked = PRIVATE_SKU_FIELDS.filter(function(f){
    return str.includes(f) && str.includes('exWorksCost');
  });
  if(leaked.length>0) console.warn('VeyaFlow privacy warning: private field in prompt:', leaked);
}

function skuReadiness(sku){
  const type = sku.productType||'cosmetic';
  const rawFields = READINESS_FIELDS[type]||READINESS_FIELDS.cosmetic;
  const fields = rawFields.map(function(f){
    return {key:f.key, label:FIELD_LABELS[f.key]||f.key, weight:f.weight};
  });
  const total = fields.reduce((s,f)=>s+f.weight,0);
  const scored = fields.reduce((s,f)=>s+(sku[f.key]&&String(sku[f.key]).trim().length>0?f.weight:0),0);
  const pct = Math.round((scored/total)*100);
  const missing = fields.filter(f=>!sku[f.key]||String(sku[f.key]).trim().length===0).map(f=>f.label);

  // Retailer readiness — per product type
  const ready = [];
  const notReady = [];
  const retailerReqs = RETAILER_REQS[type]||RETAILER_REQS.cosmetic;
  Object.entries(retailerReqs).forEach(function([retailer,reqs]){
    const allMet = reqs.every(function(r){return sku[r]&&String(sku[r]).trim().length>0;});
    if(allMet) ready.push(retailer); else notReady.push(retailer);
  });

  return {pct, missing, ready, notReady};
}

// Claims traffic light — pure logic, no API
const CLAIM_RULES = {
  'clinically tested':  {SE:'green',DK:'green',DE:'green',UK:'amber',note:'Requires clinical study reference'},
  'clinically proven':  {SE:'amber',DK:'amber',DE:'amber',UK:'red',note:'Strong claim — needs substantiation in UK'},
  'dermatologist tested':{SE:'green',DK:'green',DE:'green',UK:'green',note:'Widely accepted'},
  'dermatologist approved':{SE:'amber',DK:'amber',DE:'amber',UK:'amber',note:'"Approved" implies endorsement — rephrase to "tested"'},
  'anti-aging':         {SE:'amber',DK:'amber',DE:'red',UK:'amber',note:'Germany: must say "reduces appearance of" — not anti-aging directly'},
  'anti-ageing':        {SE:'amber',DK:'amber',DE:'red',UK:'amber',note:'Germany: rephrase required'},

  'organic':            {SE:'amber',DK:'amber',DE:'amber',UK:'amber',note:'If not certified organic — use "with organic ingredients"'},
  'natural':            {SE:'amber',DK:'amber',DE:'amber',UK:'amber',note:'No legal definition — be specific about what is natural'},
  'hypoallergenic':     {SE:'amber',DK:'amber',DE:'amber',UK:'amber',note:'No legal standard — ensure allergen testing done'},
  'spf':                {SE:'green',DK:'green',DE:'green',UK:'green',note:'Regulated — must be SPF tested to ISO 24444'},
  'collagen boosting':  {SE:'amber',DK:'amber',DE:'amber',UK:'amber',note:'Acceptable as cosmetic claim with substantiation'},
};

function getClaimLight(claim){
  const key = claim.toLowerCase().trim();
  const rule = CLAIM_RULES[key];
  if(!rule) return {light:'amber', note:'Unknown claim — verify per target market before printing on pack'};
  const markets = brand?.targetMarkets||[];
  const codes = {Denmark:'DK',Germany:'DE','United Kingdom':'UK',Sweden:'SE',Norway:'SE',Netherlands:'DE'};
  let worst = 'green';
  markets.forEach(m=>{
    const code = codes[m]||'SE';
    const val = rule[code]||'amber';
    if(val==='red') worst='red';
    else if(val==='amber'&&worst!=='red') worst='amber';
  });
  return {light:worst, note:rule.note||''};
}



function getClaimLight(claim){
  const productType = skuForm.productType||'cosmetic';
  const rules = CLAIMS_RULES[productType]||CLAIMS_RULES.cosmetic;
  const key = claim.toLowerCase().trim();
  const rule = rules[key];
  if(!rule) return {light:'amber', note:'Unknown claim — verify per target market before use'};
  // For cosmetics also check market-specific rules
  if(productType==='cosmetic'){
    const markets = brand?.targetMarkets||[];
    const codes = {Denmark:'DK',Germany:'DE','United Kingdom':'UK',Sweden:'SE',Norway:'SE',Netherlands:'DE'};
    let worst = rule.status;
    if(rule.status==='amber'){
      markets.forEach(function(m){
        const code = codes[m]||'SE';
        if(code==='DE' && (key.includes('anti-aging')||key.includes('anti-ageing'))) worst='red';
        if(code==='UK' && (key.includes('repairs')||key.includes('heals'))) worst='red';
      });
    }
    return {light:worst, note:rule.note||''};
  }
  return {light:rule.status, note:rule.note||''};
}

const RETAILER_TEMPLATES = {

    'Produktnamn':'name','EAN':'ean','Artikelnummer':'articleNo',
    'INCI-forteckning':'inci','CPNP-nummer':'cpnp','Ansvarig person EU':'euResponsible',

  },
};

function autoMatchColumns(headers){
  var map = {};
  headers.forEach(function(col){
    var colLower = col.toLowerCase().trim();
    for(var r in RETAILER_TEMPLATES){
      if(RETAILER_TEMPLATES[r][col]){map[RETAILER_TEMPLATES[r][col]]=col;return;}
    }
    for(var fi=0;fi<SKU_FIELDS.length;fi++){
      var field=SKU_FIELDS[fi];
      if(field.aliases.some(function(a){return colLower===a||colLower.includes(a)||a.includes(colLower);})){
        if(!map[field.key]) map[field.key]=col;
        return;
      }
    }
  });
  return map;
}

function parseCSVText(text){
  var lines=text.split('\n').filter(function(l){return l.trim().length>0;});
  if(lines.length<2) return null;
  var sep=lines[0].includes('\t')?'\t':',';
  var headers=lines[0].split(sep).map(function(h){return h.replace(/^["']|["']$/g,'').trim();});
  var rows=[];
  for(var i=1;i<lines.length;i++){
    var vals=[],cur='',inQ=false,line=lines[i];
    for(var j=0;j<line.length;j++){
      var c=line[j];
      if(c==='"'&&!inQ){inQ=true;continue;}
      if(c==='"'&&inQ){inQ=false;continue;}
      if(c===sep[0]&&!inQ){vals.push(cur.trim());cur='';continue;}
      cur+=c;
    }
    vals.push(cur.trim());
    var row={};
    headers.forEach(function(h,k){row[h]=(vals[k]||'');});
    if(Object.values(row).some(function(v){return v.trim().length>0;})) rows.push(row);
  }
  return {headers:headers,rows:rows};
}

function handleSkuFileUpload(input){
  var file=input.files[0];
  if(!file) return;
  var ext=file.name.split('.').pop().toLowerCase();
  var errEl=document.getElementById('upload-error');
  var statEl=document.getElementById('upload-status');
  if(errEl) errEl.textContent='';
  if(statEl) statEl.textContent='Reading file...';

  function processData(parsed){
    if(!parsed||!parsed.rows||parsed.rows.length===0){
      if(errEl) errEl.textContent='Could not read file. Ensure headers are in row 1.';
      if(statEl) statEl.textContent='';
      return;
    }
    skuUploadData=parsed;
    skuColumnMap=autoMatchColumns(parsed.headers);
    var detectedRetailer=null;
    for(var r in RETAILER_TEMPLATES){
      var matches=parsed.headers.filter(function(h){return RETAILER_TEMPLATES[r][h];}).length;
      if(matches>=3){detectedRetailer=r;break;}
    }
    if(statEl) statEl.textContent='';
    var detEl=document.getElementById('upload-detected');
    if(detectedRetailer&&detEl){
      detEl.textContent='\u2713 Recognised as '+detectedRetailer+' template \u2014 '+parsed.rows.length+' products found';
      detEl.style.color='#065F46';
    } else if(detEl){
      detEl.textContent='\u2713 '+parsed.rows.length+' rows found \u2014 '+Object.keys(skuColumnMap).length+' columns auto-matched';
      detEl.style.color='var(--navy)';
    }
    setTimeout(function(){skuUploadMode='mapping';renderPage('skus');},300);
  }

  // Excel files — use SheetJS
  if(['xlsx','xls'].includes(ext)){
    if(typeof XLSX==='undefined'){
      if(errEl) errEl.textContent='Excel parser not loaded. Please refresh the page and try again.';
      if(statEl) statEl.textContent='';
      return;
    }
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:'array'});
        // Use first sheet
        var wsName=wb.SheetNames[0];
        var ws=wb.Sheets[wsName];
        // Convert to array of arrays first to get headers + rows
        var aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        if(!aoa||aoa.length<2){
          if(errEl) errEl.textContent='Excel file appears empty or has no data rows.';
          if(statEl) statEl.textContent='';
          return;
        }
        // First non-empty row = headers
        var headers=aoa[0].map(function(h){return String(h).trim();}).filter(function(h){return h.length>0;});
        if(headers.length===0){
          if(errEl) errEl.textContent='No header row found. Ensure row 1 contains column names.';
          return;
        }
        var rows=aoa.slice(1).map(function(row){
          var obj={};
          headers.forEach(function(h,i){obj[h]=row[i]!==undefined?String(row[i]).trim():'';});
          return obj;
        }).filter(function(r){return Object.values(r).some(function(v){return v.length>0;});});
        if(statEl) statEl.textContent='Sheet: "'+wsName+'" — '+rows.length+' rows';
        processData({headers:headers,rows:rows});
      }catch(err){
        if(errEl) errEl.textContent='Could not read Excel file: '+err.message;
        if(statEl) statEl.textContent='';
      }
    };
    reader.readAsArrayBuffer(file);
    return;
  }

  // CSV / TSV / TXT
  if(!['csv','txt','tsv'].includes(ext)){
    if(errEl) errEl.textContent='Unsupported file type. Upload .xlsx, .xls, .csv, or .tsv';
    if(statEl) statEl.textContent='';
    return;
  }
  var reader=new FileReader();
  reader.onload=function(e){
    processData(parseCSVText(e.target.result));
  };
  reader.readAsText(file,'UTF-8');
}

function buildSkuPreview(){
  if(!skuUploadData) return;
  skuUploadRows = skuUploadData.rows.map(function(row){
    var sku=newSkuForm();
    SKU_FIELDS.forEach(function(field){
      var col=skuColumnMap[field.key];
      if(col&&row[col]!==undefined&&String(row[col]).trim().length>0) sku[field.key]=String(row[col]).trim();
    });
    return sku;
  }).filter(function(s){return s.name||s.ean;});
  skuUploadMode='preview';
  renderPage('skus');
}

function confirmSkuImport(){
  var existingEans=new Set(skus.map(function(s){return s.ean;}).filter(Boolean));
  var added=0,skipped=0;
  skuUploadRows.forEach(function(row){
    if(row.ean&&existingEans.has(row.ean)){skipped++;return;}
    skus.push(row);
    if(row.ean) existingEans.add(row.ean);
    added++;
  });
  saveSkus();
  skuUploadMode=null; skuUploadData=null; skuUploadRows=[]; skuColumnMap={};
  var el=document.getElementById('page-skus');
  el.innerHTML=`<div class="page-wrap"><div class="card" style="text-align:center;padding:2.5rem">
    <div style="font-size:2.5rem;margin-bottom:.75rem">\u2713</div>
    <div style="font-family:var(--serif);font-size:1.1rem;color:var(--navy);margin-bottom:.35rem">${added} product${added!==1?'s':''} imported</div>
    ${skipped?`<div style="font-family:var(--sans);font-size:.78rem;color:var(--muted);margin-bottom:.75rem">${skipped} skipped (duplicate EAN)</div>`:''}
    <button class="btn-primary" onclick="renderPage('skus')">View my products \u2192</button>
  </div></div>`;
}

function startManualSku(){
  skuUploadMode = null;
  skuEditId = 'new';
  skuTab = 1;
  skuForm = newSkuForm();
  if(brand?.euResponsible) skuForm.euResponsible = brand.euResponsible;
  renderPage('skus');
}

function editSku(id){
  const sku = skus.find(s=>s.id===id);
  if(!sku) return;
  skuEditId = id;
  skuTab = 1;
  skuForm = {...sku};
  renderPage('skus');
}

function saveSkuForm(){
  skuForm.updatedAt = new Date().toISOString();
  if(skuEditId==='new'){
    skus.unshift({...skuForm});
  } else {
    const idx = skus.findIndex(s=>s.id===skuEditId);
    if(idx>=0) skus[idx]={...skuForm};
  }
  skuEditId = null;
  saveSkus();
  renderPage('skus');
}

function cancelSkuEdit(){
  skuEditId = null;
  renderPage('skus');
}

async function formatInci(){
  const raw = skuForm.inci;
  if(!raw||raw.trim().length<10){alert('Paste your ingredient list first.');return;}
  const btn = document.getElementById('inci-format-btn');
  if(btn){btn.disabled=true;btn.textContent='Formatting...';}
  try{
    const text = await callAPI([{role:'user',content:`Format this ingredient list to correct INCI nomenclature standard — descending order by concentration, comma separated, using official INCI names. Return ONLY the formatted list, nothing else:\n\n${raw}`}],300);
    skuForm.inci = text.trim();
    const area = document.getElementById('inci-area');
    if(area) area.value = skuForm.inci;
    if(btn){btn.disabled=false;btn.textContent='✓ Formatted';}
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Format INCI';}
    alert('Could not format: '+e.message);
  }
}

async function generateSkuDesc(lang){
  if(!brand?.usp&&!skuForm.name){alert('Add a product name first.');return;}
  const btn = document.getElementById('desc-gen-'+lang);
  if(btn){btn.disabled=true;btn.textContent='Generating...';}
  try{
    const text = await callAPI([{role:'user',content:`Write a professional retail product description in ${lang==='sv'?'Swedish':lang==='da'?'Danish':'English'} for this product. Max 120 words. Tone: premium, clinical-cool, Scandinavian. No emojis.\n\nBrand: ${brand?.name||''}\\nProduct: ${skuForm.name||''}\nUSP: ${brand?.usp||''}\nKey claims: ${skuForm.claims?.join(', ')||''}\nCertifications: ${skuForm.certifications?.join(', ')||''}`}],200);
    if(lang==='sv') skuForm.descSV=text.trim();
    else if(lang==='da') skuForm.descDA=text.trim();
    else skuForm.descEN=text.trim();
    const area = document.getElementById('desc-area-'+lang);
    if(area) area.value = text.trim();
    if(btn){btn.disabled=false;btn.textContent='✓ Generated';}
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Generate';}
    alert('Could not generate: '+e.message);
  }
}

function addClaim(val){
  val = val.trim();
  if(!val||skuForm.claims.includes(val)) return;
  skuForm.claims = [...skuForm.claims, val];
  renderClaimsSection();
}

function removeClaim(claim){
  skuForm.claims = skuForm.claims.filter(c=>c!==claim);
  renderClaimsSection();
}

function renderClaimsSection(){
  const el = document.getElementById('claims-section');
  if(!el) return;
  el.innerHTML = skuForm.claims.map(claim=>{
    const {light,note} = getClaimLight(claim);
    const colors = {green:['#ECFDF5','#065F46','#A7F3D0'],amber:['#FFFBEB','#92400E','#FCD34D'],red:['#FEF2F2','#991B1B','#FCA5A5']};
    const [bg,fg,border] = colors[light]||colors.amber;
    const icon = light==='green'?'✓':light==='red'?'✗':'⚠';
    return `<div style="display:flex;align-items:flex-start;gap:.5rem;padding:.4rem .6rem;background:${bg};border:1px solid ${border};margin:.2rem 0">
      <span style="font-family:var(--mono);font-size:.75rem;color:${fg};flex-shrink:0;font-weight:700">${icon}</span>
      <div style="flex:1">
        <div style="font-family:var(--sans);font-size:.78rem;font-weight:600;color:${fg}">${claim}</div>
        ${note?`<div style="font-family:var(--mono);font-size:.55rem;color:${fg};margin-top:.1rem;opacity:.8">${note}</div>`:''}
      </div>
      <span onclick="removeClaim('${claim.replace(/'/g,'&#39;')}')" style="cursor:pointer;color:${fg};font-size:.7rem;flex-shrink:0;padding:.1rem .2rem">\u00D7</span>
    </div>`;
  }).join('')||'<div style="font-family:var(--sans);font-size:.75rem;color:var(--muted)">No claims added yet</div>';
}

function toggleDirective(id){
  if(!skuForm.directives) skuForm.directives=[];
  const idx = skuForm.directives.indexOf(id);
  if(idx>=0) skuForm.directives.splice(idx,1); else skuForm.directives.push(id);
  renderSkuEdit(document.getElementById('page-skus'));
}

function toggleAllergen(a){
  const current = skuForm.allergens||'';
  const list = current.split(',').map(s=>s.trim()).filter(Boolean);
  const idx = list.indexOf(a);
  if(idx>=0) list.splice(idx,1); else list.push(a);
  skuForm.allergens = list.join(', ');
  renderSkuEdit(document.getElementById('page-skus'));
}

function toggleSuitableFor(s){
  if(!skuForm.suitableFor) skuForm.suitableFor=[];
  const idx = skuForm.suitableFor.indexOf(s);
  if(idx>=0) skuForm.suitableFor.splice(idx,1); else skuForm.suitableFor.push(s);
  renderSkuEdit(document.getElementById('page-skus'));
}

function toggleSkuCert(cert){
  if(!skuForm.certifications) skuForm.certifications=[];
  const idx = skuForm.certifications.indexOf(cert);
  if(idx>=0) skuForm.certifications.splice(idx,1);
  else skuForm.certifications.push(cert);
  renderSkuEdit(document.getElementById('page-skus'));
}

function updateMarginCalc(){
  const el = document.getElementById('margin-calc');
  if(!el) return;
  const rsp = parseFloat(document.getElementById('net-price')?.closest('.card')?.querySelector('[placeholder="e.g. 599"]')?.value||skuForm.rspSEK||0);
  const net = parseFloat(document.getElementById('net-price')?.value||skuForm.netPriceSEK||0);
  if(!rsp||!net){el.innerHTML='Enter RSP and net price to see margin calculation';return;}
  const margin = Math.round(((rsp-net)/rsp)*100);
  const ok = margin>=40&&margin<=60;
  const warn = margin<40;
  el.innerHTML=`Retailer margin: <strong>${margin}%</strong> ${ok?'✓ Within typical 40-55% range':warn?'⚠ Below 40% — most pharmacy retailers require 40-55%':'⚠ Above 60% — verify this is intentional'}`;
  el.style.background = ok?'#ECFDF5':warn?'#FFFBEB':'#FEF2F2';
  el.style.borderColor = ok?'#A7F3D0':warn?'#FCD34D':'#FCA5A5';
  el.style.color = ok?'#065F46':warn?'#92400E':'#991B1B';
}

    return;
  }

  // ── CSV export ───────────────────────────────

        ['Produktnamn',          sku.name||''],

        ['EAN-kode',             sku.ean||''],
        ['INCI',                 sku.inci||''],
        ['CPNP',                 sku.cpnp||''],
        ['EU Ansvarlig person',  sku.euResponsible||''],
        ['Vejledende pris DKK',  sku.rspDKK||''],
        ['Holdbarhed (mdr)',     sku.shelfLifeMonths||''],
        ['PAO (mdr)',            sku.paoMonths||''],
        ['Oprindelsesland',      sku.countryOfMfr||''],
        ['MOQ',                  sku.moq||''],
        ['Leveringstid (dage)',  sku.leadDays||''],
        ['Certifikater',         (sku.certifications||[]).join('; ')],
        ['Påstande',             (sku.claims||[]).join('; ')],
        ['Beskrivelse EN',       sku.descEN||''],
        ['Beskrivelse DA',       sku.descDA||''],
      ],
      'Lyko': [
        ['Produktnamn',          sku.name||''],
        ['EAN',                  sku.ean||''],
        ['INCI',                 sku.inci||''],
        ['RSP SEK',              sku.rspSEK||''],
        ['PAO',                  sku.paoMonths||''],
        ['Hållbarhet',           sku.shelfLifeMonths||''],
        ['Nettovikt',            `${sku.netContent||''} ${sku.netUnit||''}`],
        ['Certifieringar',       (sku.certifications||[]).join('; ')],
        ['Produktbeskrivning SV',sku.descSV||''],
        ['Produktbeskrivning EN',sku.descEN||''],
      ],
      'Kicks': [
        ['Produktnamn',          sku.name||''],
        ['EAN',                  sku.ean||''],
        ['INCI',                 sku.inci||''],
        ['CPNP',                 sku.cpnp||''],

    // Build CSV: header row + data row
    function escCsv(v){
      const s = String(v).replace(/"/g,'""');
      return /[,"\n\r]/.test(s) ? '"'+s+'"' : s;
    }
    const header = fields.map(f=>escCsv(f[0])).join(',');
    const row    = fields.map(f=>escCsv(f[1])).join(',');
    const csv    = '\uFEFF' + header + '\r\n' + row + '\r\n'; // BOM for Excel UTF-8

    sku.rspGBP ? `RSP UK:             ${sku.rspGBP} GBP` : '',
    sku.rspEUR ? `RSP EU:             ${sku.rspEUR} EUR` : '',
    `MOQ:                ${sku.moq||''} units`,
    `Lead time:          ${sku.leadDays||''} days`,
    sku.warehouse ? `Warehouse:          ${sku.warehouse}` : '',
    ``,
    `DESCRIPTIONS`,
    sku.descEN ? `English:\n${sku.descEN}` : '',
    sku.descSV ? `Swedish:\n${sku.descSV}` : '',
    sku.descDA ? `Danish:\n${sku.descDA}` : '',
    ``,
    `--- VeyaFlow · veyaflow.com · ${new Date().toLocaleDateString('en-GB')} ---`,
  ].filter(l=>l!==undefined&&l!=='').join('\n');

  downloadBlob(lines, filename+'.txt', 'text/plain;charset=utf-8');
}

function downloadBlob(content, filename, mimeType){
  const blob = new Blob([content], {type:mimeType});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function runClaimLocalizer(){
  const input = document.getElementById('claims-input')?.value||'';
  if(!input.trim()){alert('Paste some claims first.');return;}

  const selectedMarkets = [...document.querySelectorAll('.market-chip.selected')].map(el=>el.dataset.market).filter(Boolean);
  if(!selectedMarkets.length){alert('Select at least one target market.');return;}

  claimsState = {input, result:null, loading:true};
  renderClaims(document.getElementById('page-claims'));

  const prompt = `You are a cosmetics and consumer goods regulatory expert for Nordic brands expanding into European markets. April 2026.

Analyse these product claims/copy for a ${brand.category||'consumer'} brand (${brand.name}) entering: ${selectedMarkets.join(', ')}.

CLAIMS TO ANALYSE:
${input}

For each distinct claim or statement, provide a structured assessment. Format your response as a series of claim blocks using this EXACT format:

CLAIM: [exact claim text]
STATUS: [GREEN / AMBER / RED]
MARKETS_AFFECTED: [list of markets where this is an issue, or "All clear"]
ISSUE: [specific regulatory problem, or "No issues identified"]
RECOMMENDED_CHANGE: [exact suggested replacement wording, or "No change needed"]
---

Rules for status:
- GREEN: Claim is safe across all target markets as written
- AMBER: Claim needs minor rewording or is market-specific — safe in some, restricted in others
- RED: Claim is a serious regulatory risk — therapeutic/drug claim, unsubstantiated, or banned in one or more target markets

Key rules to apply:
- Germany: "Anti-Aging" must be "reduces the appearance of signs of aging" — the word itself is increasingly restricted
- Germany: Any claim implying cellular repair or regeneration is a drug claim
- UK post-Brexit: "Repairs", "heals", "regenerates" are drug claims under MHRA guidance
- EU/UK: "Clinically proven" requires a clinical study on file — flag if no study reference
- EU/UK: "Doctor recommended" or "dermatologist approved" implies endorsement — requires substantiation
- SPF claims require ISO 24444 testing — flag if SPF claimed without test reference
- "Organic" without certification = misleading under Green Claims Directive (September 2026)
- "Natural" is acceptable but should be qualified
- "Vegan" is acceptable across all markets
- Health claims on food/supplements: only EFSA-approved claims permitted (EU)

Be specific and actionable. Every RED must have a clear recommended change.`;

  try{
    const text = await callAPI([{role:'user',content:prompt}],1400);
    claimsState = {input, result:text, loading:false};
  }catch(err){
    claimsState = {input, result:'ERROR:'+err.message, loading:false};
  }
  renderClaims(document.getElementById('page-claims'));
}

function renderClaimsResult(){
  if(!claimsState.result) return '';
  if(claimsState.result.startsWith('ERROR:')) return `<div style="color:var(--red);padding:1rem;background:#FEF2F2;font-family:var(--sans);font-size:.82rem">${claimsState.result.replace('ERROR:','')}</div>`;

  const blocks = claimsState.result.split('---').map(b=>b.trim()).filter(b=>b.length>20);
  let green=0, amber=0, red=0;

  const parsed = blocks.map(block=>{
    const claim = (block.match(/CLAIM:\s*(.+)/)||['',''])[1].trim();
    const status = (block.match(/STATUS:\s*(GREEN|AMBER|RED)/)||['','AMBER'])[1];
    const markets = (block.match(/MARKETS_AFFECTED:\s*(.+)/)||['',''])[1].trim();
    const issue = (block.match(/ISSUE:\s*(.+)/)||['',''])[1].trim();
    const fix = (block.match(/RECOMMENDED_CHANGE:\s*(.+)/)||['',''])[1].trim();
    if(status==='GREEN') green++;
    else if(status==='AMBER') amber++;
    else if(status==='RED') red++;
    return {claim, status, markets, issue, fix};
  }).filter(p=>p.claim);

  const statusStyle = {
    GREEN: {bg:'#ECFDF5', border:'#A7F3D0', color:'#065F46', icon:'✓'},
    AMBER: {bg:'#FFFBEB', border:'#FCD34D', color:'#92400E', icon:'⚠'},
    RED:   {bg:'#FEF2F2', border:'#FCA5A5', color:'#991B1B', icon:'✗'},
  };

  return `
    <!-- Summary bar -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;border:1px solid var(--border);background:#fff;margin-bottom:1rem">
      ${[['✓ Clear',green,'#ECFDF5','#065F46'],['⚠ Review',amber,'#FFFBEB','#92400E'],['✗ Risk',red,'#FEF2F2','#991B1B']].map(([label,count,bg,color])=>`
        <div style="padding:.85rem;text-align:center;background:${bg}">
          <div style="font-family:var(--serif);font-size:1.6rem;color:${color};line-height:1">${count}</div>
          <div style="font-family:var(--mono);font-size:.55rem;color:${color};text-transform:uppercase;letter-spacing:.08em;margin-top:.2rem">${label}</div>
        </div>
      `).join('')}
    </div>

    <!-- Claim cards -->
    ${parsed.map(p=>{
      const s = statusStyle[p.status]||statusStyle.AMBER;
      return `
        <div style="border:1px solid ${s.border};background:${s.bg};padding:1rem 1.125rem;margin-bottom:.6rem">
          <div style="display:flex;align-items:flex-start;gap:.6rem;margin-bottom:.5rem">
            <span style="font-family:var(--mono);font-size:.8rem;font-weight:700;color:${s.color};flex-shrink:0">${s.icon}</span>
            <div style="font-family:var(--sans);font-size:.88rem;font-weight:600;color:${s.color}">"${p.claim}"</div>
          </div>
          ${p.markets&&p.markets!=='All clear'?`<div style="font-family:var(--mono);font-size:.58rem;color:${s.color};margin-bottom:.35rem">Markets: ${p.markets}</div>`:''}
          ${p.issue&&p.issue!=='No issues identified'?`<div style="font-family:var(--sans);font-size:.78rem;color:${s.color};line-height:1.5;margin-bottom:.35rem">${p.issue}</div>`:''}
          ${p.fix&&p.fix!=='No change needed'?`
            <div style="background:rgba(255,255,255,.6);border:1px solid ${s.border};padding:.5rem .75rem;margin-top:.35rem">
              <div style="font-family:var(--mono);font-size:.55rem;color:${s.color};text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem">Suggested wording</div>
              <div style="font-family:var(--sans);font-size:.8rem;color:var(--ink);font-style:italic">"${p.fix}"</div>
            </div>
          `:''}
        </div>
      `;
    }).join('')}

    <div style="display:flex;gap:.75rem;margin-top:1rem">
      <button class="btn-outline" onclick="claimsState.result=null;claimsState.input='';renderClaims(document.getElementById('page-claims'))">← New analysis</button>
    </div>
  `;
}

  'Germany':        {cosmetics:0, food:0, fashion:0, wellness:0, note:'EU member — no import duty from Sweden (EU internal trade)'},
  'Netherlands':    {cosmetics:0, food:0, fashion:0, wellness:0, note:'EU member — no import duty from Sweden (EU internal trade)'},
  'France':         {cosmetics:0, food:0, fashion:0, wellness:0, note:'EU member — no import duty from Sweden (EU internal trade)'},
  'Norway':         {cosmetics:3.3, food:15, fashion:10.7, wellness:0, note:'EEA — preferential rates. Cosmetics 3.3%, food varies, fashion 10.7%'},
  'United Kingdom': {cosmetics:0, food:0, fashion:12, wellness:0, note:'UK Global Tariff: Cosmetics 0%, fashion 12%, food varies by product'},
  'United States':  {cosmetics:0, food:0, fashion:16.5, wellness:0, note:'MFN rates. Fashion 16.5% avg. Cosmetics generally 0%'},
  'Japan':          {cosmetics:5.8, food:8.5, fashion:9.1, wellness:0, note:'Japan EPA preferential. Cosmetics 5.8%, food 8.5%, fashion 9.1%'},
  'South Korea':    {cosmetics:6.5, food:8.0, fashion:13, wellness:0, note:'Korea FTA rates. Cosmetics 6.5%'},
  'Australia':      {cosmetics:0, food:0, fashion:0, wellness:0, note:'Australia FTA — most goods 0%'},
  'Canada':         {cosmetics:0, food:0, fashion:18, wellness:0, note:'CETA agreement. Cosmetics 0%, fashion ~18%'},
};

// Freight cost estimates per unit (SEK) by mode + destination
const FREIGHT_EST = {
  road:   {Denmark:8, Germany:12, Netherlands:14, France:18, Norway:10, Belgium:14, Austria:16},
  sea:    {'United Kingdom':22, 'United States':45, Japan:65, 'South Korea':58, Australia:72, Canada:50, Singapore:60},
  air:    {'United Kingdom':85, 'United States':140, Japan:180, 'South Korea':165, Australia:210, Canada:150, Singapore:155},
};

function getFreightCost(mode, market){
  const modeRates = FREIGHT_EST[mode]||{};
  return modeRates[market] || (mode==='road'?15:mode==='sea'?50:120);
}

function getDutyRate(market, category){
  const rates = DUTY_RATES[market];
  if(!rates) return {rate:0, note:'Rate unknown — verify with customs broker'};
  const catKey = category.toLowerCase().includes('beauty')||category.toLowerCase().includes('skincare')?'cosmetics':
                 category.toLowerCase().includes('food')?'food':
                 category.toLowerCase().includes('fashion')||category.toLowerCase().includes('apparel')?'fashion':'wellness';
  return {rate:rates[catKey]||0, note:rates.note||''};
}

function updateMarginResult(){
  const el = document.getElementById('margin-result');
  if(!el) return;
  const s = marginState;
  if(!s.rsp||!s.netPrice){
    el.innerHTML=`<div class="card" style="text-align:center;padding:2rem;color:var(--muted)"><div style="font-family:var(--mono);font-size:.68rem">Enter RSP and net price to see margin analysis</div></div>`;
    return;
  }

  const units = s.units||1000;
  const rsp = s.rsp;
  const net = s.netPrice;
  const cogs = s.cogs||0;
  const freight = s.freight||0;

  // Retailer margin
  const retailerMargin = ((rsp-net)/rsp*100);

  // Brand deductions
  const promoDeduction = net * (s.beautyDays/100||0);
  const returnsDeduction = net * (s.returns/100||0);
  const samplesTotal = s.samples||0; // per store, estimated 20 stores
  const listingPerUnit = (s.listingFee||0)/units;

  const trueNetPerUnit = net - promoDeduction - returnsDeduction - (samplesTotal*20/units) - listingPerUnit;
  const grossProfitPerUnit = trueNetPerUnit - cogs - freight;
  const grossMarginPct = trueNetPerUnit>0?(grossProfitPerUnit/trueNetPerUnit*100):0;
  const totalRevenue = trueNetPerUnit * units;
  const totalGrossProfit = grossProfitPerUnit * units;

  // Break-even
  const fixedCosts = (s.listingFee||0) + (s.samples||0)*20;
  const breakEven = (cogs+freight)>0?Math.ceil(fixedCosts/(trueNetPerUnit-(cogs+freight))):0;

  const marginColor = retailerMargin>=40&&retailerMargin<=60?'#10B981':retailerMargin<35?'#EF4444':'#F59E0B';
  const gpColor = grossMarginPct>=40?'#10B981':grossMarginPct>=20?'#F59E0B':'#EF4444';

  el.innerHTML=`
    <div class="card" style="margin-bottom:.75rem">
      <div style="font-family:var(--mono);font-size:.58rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.75rem">Retailer relationship</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem">
        <div style="text-align:center;padding:.75rem;background:#F9F8F6">
          <div style="font-family:var(--serif);font-size:1.6rem;color:${marginColor}">${retailerMargin.toFixed(1)}%</div>
          <div style="font-family:var(--mono);font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Retailer margin</div>
          <div style="font-family:var(--sans);font-size:.65rem;color:${marginColor};margin-top:.2rem">${retailerMargin>=40&&retailerMargin<=60?'✓ Target range 40-60%':retailerMargin<35?'⚠ Below minimum':'⚠ Check this'}</div>
        </div>
        <div style="text-align:center;padding:.75rem;background:#F9F8F6">
          <div style="font-family:var(--serif);font-size:1.6rem;color:${gpColor}">${grossMarginPct.toFixed(1)}%</div>
          <div style="font-family:var(--mono);font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Your gross margin</div>
          <div style="font-family:var(--sans);font-size:.65rem;color:${gpColor};margin-top:.2rem">${grossMarginPct>=40?'✓ Healthy':'⚠ Pressure here'}</div>
        </div>
      </div>

      <div style="font-family:var(--mono);font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem">True net-to-brand (after all deductions)</div>
      ${[
        ['RSP', `${rsp.toFixed(0)} SEK`, '#333'],
        ['→ Net to brand (headline)', `${net.toFixed(0)} SEK`, '#333'],
        ['− Promo/Beauty Days', `-${promoDeduction.toFixed(0)} SEK`, '#991B1B'],
        ['− Returns allowance', `-${returnsDeduction.toFixed(0)} SEK`, '#991B1B'],
        ['− Listing fee (per unit)', `-${listingPerUnit.toFixed(0)} SEK`, '#991B1B'],
        ['− Samples', `-${(samplesTotal*20/units).toFixed(0)} SEK`, '#991B1B'],
        ['= True net per unit', `${trueNetPerUnit.toFixed(0)} SEK`, 'var(--navy)'],
        ['− COGS', `-${cogs.toFixed(0)} SEK`, '#92400E'],
        ['− Freight', `-${freight.toFixed(0)} SEK`, '#92400E'],
        ['= Gross profit per unit', `${grossProfitPerUnit.toFixed(0)} SEK`, gpColor],
      ].map(([label,val,color])=>`
        <div style="display:flex;justify-content:space-between;padding:.25rem 0;border-bottom:1px solid var(--border)">
          <div style="font-family:var(--sans);font-size:.77rem;color:var(--muted)">${label}</div>
          <div style="font-family:var(--mono);font-size:.77rem;font-weight:600;color:${color}">${val}</div>
        </div>
      `).join('')}
    </div>

    <div class="card" style="margin-bottom:.75rem">
      <div style="font-family:var(--mono);font-size:.58rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.75rem">Year 1 at ${units.toLocaleString()} units</div>
      ${[
        ['Total revenue to brand', `${Math.round(totalRevenue).toLocaleString()} SEK`],
        ['Total gross profit', `${Math.round(totalGrossProfit).toLocaleString()} SEK`],
        ['Break-even units', breakEven>0?`${breakEven.toLocaleString()} units`:'Enter COGS to calculate'],
      ].map(([label,val])=>`
        <div style="display:flex;justify-content:space-between;padding:.3rem 0;border-bottom:1px solid var(--border)">
          <div style="font-family:var(--sans);font-size:.8rem;color:var(--muted)">${label}</div>
          <div style="font-family:var(--mono);font-size:.8rem;font-weight:600;color:var(--navy)">${val}</div>
        </div>
      `).join('')}
    </div>

    ${grossMarginPct<20&&cogs>0?`

      </div>
    `:''}
  `;
}
