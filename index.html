function updateLandedResult(){
  const el = document.getElementById('landed-result');
  if(!el) return;
  const s = landedState;

  // Read from DOM inputs (they may have changed)
  document.querySelectorAll('[data-landed]').forEach(inp=>{
    const key = inp.dataset.landed;
    landedState[key] = inp.type==='number'?(parseFloat(inp.value)||0):inp.value;
  });

  const exWorks = landedState.exWorks||0;
  if(!exWorks){
    el.innerHTML=`<div class="card" style="text-align:center;padding:2rem;color:var(--muted)"><div style="font-family:var(--mono);font-size:.68rem">Enter ex-works cost per unit to calculate</div></div>`;
    return;
  }

  const units = landedState.units||500;
  const market = landedState.market||'Denmark';
  const category = landedState.category||'Skincare & Beauty';
  const freightMode = landedState.freightMode||'road';
  const rsp = landedState.rsp||0;

  const freightPerUnit = getFreightCost(freightMode, market);
  const {rate:dutyRate, note:dutyNote} = getDutyRate(market, category);
  const dutyPerUnit = exWorks * (dutyRate/100);

  // VAT on import (applied to CIF value in most markets)
  const vatRates = {Denmark:25, Germany:19, Netherlands:21, 'United Kingdom':20, Norway:25, France:20, Belgium:21, Austria:20, 'United States':0, Japan:10, 'South Korea':10, Australia:10, Canada:5};
  const vatRate = vatRates[market]||20;
  const cifValue = exWorks + freightPerUnit;
  const vatOnImport = (cifValue + dutyPerUnit) * (vatRate/100);
  // Note: VAT is reclaimable for VAT-registered businesses — show both

  // One-off costs (amortised per unit)
  const oneOffCosts = {
    'United Kingdom': {label:'UK Responsible Person setup', cost:65000, perUnit:65000/units}, // ~£5K in SEK
    Norway: {label:'Norwegian Responsible Person + notification', cost:8000, perUnit:8000/units},
    Japan: {label:'PMDA notification (estimated)', cost:45000, perUnit:45000/units},
    'South Korea': {label:'MFDS registration (estimated)', cost:35000, perUnit:35000/units},
  };
  const oneOff = oneOffCosts[market]||null;

  // Customs broker
  const brokerFee = ['United Kingdom','United States','Japan','South Korea','Australia','Canada'].includes(market)?3500:0;
  const brokerPerUnit = brokerFee/units;

  const totalLanded = exWorks + freightPerUnit + dutyPerUnit + (oneOff?oneOff.perUnit:0) + brokerPerUnit;
  const vatReclaimable = vatOnImport; // if VAT registered

  // Net to brand if RSP provided
  const netToBrand = rsp>0?(rsp*0.45)-totalLanded:null; // 45% = brand's share after ~55% retailer margin

  el.innerHTML=`
    <div class="card" style="margin-bottom:.75rem">
      <div style="font-family:var(--mono);font-size:.58rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.75rem">Landed cost breakdown — ${market}</div>
      ${[
        ['Ex-works cost', `${exWorks.toFixed(0)} SEK`, 'var(--ink)'],
        [`Freight (${freightMode})`, `${freightPerUnit.toFixed(0)} SEK`, 'var(--ink)'],
        [`Import duty (${dutyRate}%)`, dutyRate>0?`${dutyPerUnit.toFixed(0)} SEK`:'0 SEK — EU/FTA', dutyRate>0?'#92400E':'#10B981'],
        ...(oneOff?[[`${oneOff.label} (amortised)`, `${oneOff.perUnit.toFixed(0)} SEK/unit`, '#92400E']]:[]),
        ...(brokerFee>0?[[`Customs broker (amortised)`, `${brokerPerUnit.toFixed(0)} SEK/unit`, '#92400E']]:[]),
        [`VAT on import (${vatRate}%)`, `${vatOnImport.toFixed(0)} SEK — reclaimable if VAT registered`, '#F59E0B'],
      ].map(([label,val,color])=>`
        <div style="display:flex;justify-content:space-between;padding:.25rem 0;border-bottom:1px solid var(--border)">
          <div style="font-family:var(--sans);font-size:.77rem;color:var(--muted)">${label}</div>
          <div style="font-family:var(--mono);font-size:.77rem;font-weight:600;color:${color}">${val}</div>
        </div>
      `).join('')}
      <div style="display:flex;justify-content:space-between;padding:.4rem 0;margin-top:.25rem">
        <div style="font-family:var(--sans);font-size:.82rem;font-weight:600;color:var(--navy)">True landed cost per unit</div>
        <div style="font-family:var(--mono);font-size:.9rem;font-weight:700;color:var(--navy)">${totalLanded.toFixed(0)} SEK</div>
      </div>
      ${vatReclaimable>0?`<div style="font-family:var(--mono);font-size:.58rem;color:#92400E;margin-top:.2rem">+ ${vatReclaimable.toFixed(0)} SEK VAT (reclaimable if VAT registered in ${market})</div>`:''}
    </div>

    ${dutyNote?`<div style="background:#EFF6FF;border:1px solid #BFDBFE;padding:.6rem .85rem;font-family:var(--mono);font-size:.6rem;color:#1E40AF;margin-bottom:.75rem">${dutyNote}</div>`:''}

    ${netToBrand!==null?`
      <div class="card">
        <div style="font-family:var(--mono);font-size:.58rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem">Net-to-brand at ${rsp} RSP</div>
        <div style="display:flex;justify-content:space-between;padding:.25rem 0;border-bottom:1px solid var(--border)">
          <div style="font-family:var(--sans);font-size:.77rem;color:var(--muted)">Brand share (at 45% of RSP)</div>
          <div style="font-family:var(--mono);font-size:.77rem;color:var(--ink)">${(rsp*0.45).toFixed(0)} SEK</div>
        </div>
        <div style="display:flex;justify-content:space-between;padding:.25rem 0;border-bottom:1px solid var(--border)">
          <div style="font-family:var(--sans);font-size:.77rem;color:var(--muted)">True landed cost</div>
          <div style="font-family:var(--mono);font-size:.77rem;color:#991B1B">−${totalLanded.toFixed(0)} SEK</div>
        </div>
        <div style="display:flex;justify-content:space-between;padding:.4rem 0;margin-top:.15rem">
          <div style="font-family:var(--sans);font-size:.82rem;font-weight:600;color:var(--navy)">Net-to-brand per unit</div>
          <div style="font-family:var(--mono);font-size:.9rem;font-weight:700;color:${netToBrand>0?'#10B981':'#EF4444'}">${netToBrand.toFixed(0)} SEK</div>
        </div>
      </div>
    `:''}

    <div style="background:#FFFBEB;border:1px solid #FCD34D;padding:.75rem 1rem;font-family:var(--sans);font-size:.73rem;color:#92400E;line-height:1.5;margin-top:.75rem">
      <strong>Disclaimer:</strong> These are estimates based on standard rates. Verify duty rates with your customs broker before committing to a shipment. Rates correct as of April 2026.
    </div>
  `;
}

// Build commercial proof points from brand profile — never AI-estimated
function buildCommercialNumbers(){
  const pts = [];
  if(brand?.revenueGrowth)   pts.push(`${brand.revenueGrowth}% YoY revenue growth`);
  if(brand?.unitsSold)       pts.push(`${brand.unitsSold} units sold in home market`);
  if(brand?.repeatRate)      pts.push(`${brand.repeatRate}% repeat purchase rate`);
  if(brand?.socialFollowers) pts.push(`${brand.socialFollowers} followers`);
  if(brand?.reviewScore)     pts.push(`${brand.reviewScore} avg customer review`);
  if(brand?.annualRevenue)   pts.push(`${brand.annualRevenue} annual revenue`);
  if(brand?.clinicalClaims)  pts.push(brand.clinicalClaims);
  return pts.slice(0,3);
}

function buildAsk(){
  const stage = pitchForm.stage||'cold';
  const retailer = pitchForm.retailer||'the retailer';
  const intel = PITCH_INTEL[retailer];
  const reviewDate = intel?.rangeReview || 'their next range review';
  if(stage==='cold')    return `15-minute call this month`;
  if(stage==='followup')return `Range review meeting — ${retailer} reviews in ${reviewDate}`;
  if(stage==='warm')    return `Sample send and data pack — can I ship to your office?`;
  return '15-minute call this month';
}

  const numbers = buildCommercialNumbers();
  const ask = buildAsk();
  const hook = pitchForm.hook||'';
  const heroSku = skus.length>0?sanitiseSkuForRetailer(skus[0]):null; // sanitised

  const numbersStr = numbers.length>0

  const prompt = `You are a retail sales expert writing buyer pitch emails for a ${brand?.category||'consumer'} brand entering ${pitchForm.targetMarket}.

Generate THREE email variants. For EACH variant output in this EXACT format:

BODY:

LINKEDIN: [max 300 chars, one question that invites reply]

function copyToClipboard(text){
  navigator.clipboard?.writeText(text).then(()=>{
    // Brief visual feedback
    const el = event.target;
    const orig = el.textContent;
    el.textContent = 'Copied ✓';
    setTimeout(()=>el.textContent=orig, 1500);
  }).catch(()=>{
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

function selectSupplier(id){
  const s=SUPPLIERS.find(x=>x.id===id);
  if(!s||s.status==='complete')return;
  if(selectedSupplier?.id===id){selectedSupplier=null;nudgeResult=null;}
  else{selectedSupplier=s;nudgeResult=null;generateNudge(s);}
  renderSuppliers(document.getElementById('page-suppliers'));
}

function renderNudgePanel(s){
  if(nudgeLoading) return `<div style="text-align:center;padding:1.5rem"><div class="spinner"></div><div style="font-family:var(--mono);font-size:.6rem;color:var(--muted)">Writing nudge for ${s.name}…</div></div>`;
  if(!nudgeResult) return `<div style="font-family:var(--mono);font-size:.6rem;color:var(--muted)">Generating nudge email…</div>`;
  return `
    <div style="font-family:var(--mono);font-size:.58rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.65rem">★ Nudge email</div>
    <div class="email-box" style="font-size:.78rem;margin-bottom:.75rem">${nudgeResult}</div>
    <div style="display:flex;gap:.65rem;flex-wrap:wrap">
      <a href="mailto:${s.contact}?subject=Compliance+data+request&body=${encodeURIComponent(nudgeResult)}" style="padding:.45rem .9rem;background:var(--navy);color:#fff;font-family:var(--mono);font-size:.6rem;text-decoration:none">Open in email →</a>
      <button onclick="generateNudge(SUPPLIERS.find(x=>x.id===${s.id}))" style="padding:.45rem .9rem;background:none;border:1px solid var(--border);color:var(--navy);font-family:var(--mono);font-size:.6rem;cursor:pointer">Regenerate</button>
    </div>
  `;
}

async function generateNudge(s){
  nudgeLoading=true;
  nudgeResult=null;
  const langMap={Portugal:"Portuguese",Germany:"German",Sweden:"Swedish",Indonesia:"Indonesian",Turkey:"Turkish",China:"Mandarin Chinese",Ghana:"English",Italy:"Italian",Sweden:"Swedish"};
  const lang=langMap[s.country]||"English";
  const prompt=`Write a professional, friendly supplier nudge email in ${lang} (with English translation if not English) requesting missing compliance data.

Supplier: ${s.name}, ${s.country}
Commodity: ${s.commodity}
Missing data: ${s.missing.map(m=>DATA_LABELS[m]||m).join(", ")}
Previous nudges sent: ${s.nudgeCount}
Status: ${s.status}
EUDR in scope: ${s.eudrScope?"Yes — urgent":"No"}

Write a concise, professional email that:
1. Addresses the supplier by company name
2. Explains why this data is needed (EU regulatory compliance by December 2026)
3. Lists exactly what is missing
4. Gives a clear deadline (14 days)
5. Offers help if they have questions
6. Is warm but firm — not aggressive

Keep it under 150 words. ${lang!=="English"?"Then provide an English translation.":""}`;
  try{
    const text=await callAPI([{role:"user",content:prompt}],800);
    nudgeResult=text;
  }catch(e){
    nudgeResult="Could not generate nudge. Check connection.";
  }
  nudgeLoading=false;
  const panel=document.getElementById(`nudge-panel-${s.id}`);
  if(panel)panel.innerHTML=renderNudgePanel(s);
}

async function generateCircularRoutes(){
  const btn=document.getElementById('c-btn');
  if(btn){btn.disabled=true;btn.textContent='Finding routes…';}
  circularLoading=true;

  const isBan=ESPR_BAN_CATS.includes(circularForm.category);
  const isDisc=ESPR_DISC_CATS.includes(circularForm.category);
  const relPartners=PARTNERS.filter(p=>!circularForm.category||p.productCategories.includes(circularForm.category));

  const prompt=`You are the VeyaFlow Circular GPS. Route ${circularForm.units} units of "${circularForm.productName}" (category: ${circularForm.category}, materials: ${circularForm.materials||'unspecified'}) to circular partners.

${isBan?'CRITICAL: This product is subject to the EU July 2026 Textile Destruction Ban — routing is legally mandatory.':isDisc?'Note: ESPR Article 24 disclosure is required for this product category.':'Note: Circular routing is best practice for sustainability positioning.'}

Discard reason: ${circularForm.reason?.replace(/_/g,' ')}
Preferred route: ${circularForm.preferredCat||'Any'}

Available partners:
${relPartners.map(p=>`- ${p.name} (${p.city}, ${p.country}): ${p.category}, ESPR registered: ${p.espr}, buyback: ${p.buyback?'€'+p.buyback+'/unit':'none'}. ${p.description}`).join('\n')}

Recommend top 3 partners. For each:
1. Why it is the best fit for this specific product
2. Estimated carbon saved vs landfill (kg CO2e — use 2.1kg/unit baseline)
3. ESPR compliance documentation they provide
4. Routing recommendation: LEAD, SECONDARY, or HOLD

Format as 3 numbered recommendations.`;

  try{
    const text=await callAPI([{role:"user",content:prompt}]);
    const parts=text.split(/\n(?=\d+\.\s)/g).filter(s=>s.trim().length>20).slice(0,3);
    const routes=parts.map((p,i)=>{
      const partner=relPartners[i]||relPartners[0]||PARTNERS[0];
      return{partner,analysis:p.replace(/^\d+\.\s/,'').trim(),carbonSaved:Math.round(parseInt(circularForm.units||100)*(1.8+i*0.3)*10)/10,recommendation:["LEAD","SECONDARY","HOLD"][i]};

    savePageState('ns_circularForm',circularForm);

  const resEl=document.getElementById('circular-results');
  if(resEl)resEl.innerHTML=circularResult?renderCircularResults():'';

  findForm.category=findForm.category||brand?.category||'';
  findForm.targetMarket=findForm.targetMarket||brand?.targetMarkets?.[0]||'';

  const filtered=getFilteredMfrs();
  const compareItems=compareListIds.map(id=>MANUFACTURERS.find(m=>m.id===id)).filter(Boolean);

  el.innerHTML=`
    <div class="topbar">
      <div>
        <div class="page-title">Manufacturer Finder</div>
        <div class="page-sub">${MANUFACTURERS.length} verified manufacturers · Sustainability scored · Market-readiness matched</div>
      </div>
      ${compareListIds.length>=2?`<button class="btn-${compareMode?'outline':'gold'}" onclick="compareMode=!compareMode;renderFind(document.getElementById('page-find'))">${compareMode?'← Back to list':`Compare ${compareListIds.length} selected →`}</button>`:''}
    </div>
    <div class="content">
      ${compareMode&&compareItems.length>=2?renderCompareTable(compareItems):renderFindList(filtered,compareItems)}
    </div>
  `;
}

function renderFindList(filtered,compareItems){
  return `
    <div class="col-filter">
      <!-- Filters -->
      <div>
        <div class="card">
          ${brand?`<div style="padding:.5rem .75rem;background:rgba(196,168,130,.08);border:1px solid rgba(196,168,130,.2);margin-bottom:.85rem;font-family:var(--mono);font-size:.58rem;color:var(--gold)">◎ Pre-filled from ${brand.name}'s profile</div>`:''}
          <div style="font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:.85rem">Filter ${MANUFACTURERS.length} manufacturers</div>
          <div style="position:relative;margin-bottom:.85rem">
            <span style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none">⌕</span>
            <input type="text" value="${findForm.query}" placeholder="Name, country, certification…" style="padding-left:2.1rem" oninput="findForm.query=this.value;renderFind(document.getElementById('page-find'))">
          </div>
          <div class="field"><label class="lbl">Category</label>
            <select onchange="findForm.category=this.value;renderFind(document.getElementById('page-find'))">
              <option value="">All categories</option>${MFR_CATS.map(c=>`<option${findForm.category===c?' selected':''}>${c}</option>`).join('')}
            </select>
          </div>
          <div class="field"><label class="lbl">Type</label>
            <select onchange="findForm.mfrType=this.value;renderFind(document.getElementById('page-find'))">
              <option value="">All types</option>${MFR_TYPES.map(t=>`<option${findForm.mfrType===t?' selected':''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="field"><label class="lbl">Target market</label>
            <select onchange="findForm.targetMarket=this.value;renderFind(document.getElementById('page-find'))">
              <option value="">Any market</option>${MFR_MARKETS_LIST.map(m=>`<option${findForm.targetMarket===m?' selected':''}>${m}</option>`).join('')}
            </select>
          </div>
          <div class="grid-2">
            <div class="field"><label class="lbl">Sustainability</label>
              <select onchange="findForm.sustainability=this.value;renderFind(document.getElementById('page-find'))">
                <option value="">Any</option><option value="HIGH"${findForm.sustainability==='HIGH'?' selected':''}>High only</option><option value="MEDIUM"${findForm.sustainability==='MEDIUM'?' selected':''}>Medium+</option>
              </select>
            </div>
            <div class="field"><label class="lbl">Max MOQ</label>
              <select onchange="findForm.maxMoq=this.value;renderFind(document.getElementById('page-find'))">
                <option value="">Any</option>
                ${[100,300,500,1000,5000].map(n=>`<option value="${n}"${findForm.maxMoq==n?' selected':''}>≤ ${n.toLocaleString()}</option>`).join('')}
              </select>
            </div>
          </div>
          <div style="font-family:var(--mono);font-size:.58rem;color:var(--muted);padding-top:.75rem;border-top:1px solid var(--border)">${filtered.length} of ${MANUFACTURERS.length} · sorted by sustainability</div>
        </div>

        ${compareListIds.length>0?`
          <div class="card" style="background:#EFF6FF;border-color:#BFDBFE">
            <div style="font-family:var(--mono);font-size:.58rem;color:var(--blue);margin-bottom:.5rem">Comparing ${compareListIds.length}/3 selected</div>
            ${compareItems.map(m=>`<div style="font-family:var(--sans);font-size:.7rem;color:var(--navy)">· ${m.name}</div>`).join('')}
            ${compareListIds.length>=2?`<button class="btn-primary" style="margin-top:.65rem;font-size:.6rem;padding:.5rem .75rem" onclick="compareMode=true;renderFind(document.getElementById('page-find'))">Compare now →</button>`:''}
            <div style="font-family:var(--mono);font-size:.52rem;color:var(--muted);margin-top:.35rem">Select up to 3 manufacturers</div>
          </div>
        `:''}
      </div>

      <!-- Results -->
      <div>
        ${filtered.length===0?`<div class="card empty-state"><div class="empty-title">No matches</div><div class="empty-sub">Try broadening your filters</div></div>`:''}
        ${filtered.map(mfr=>{
          const score=calcSusScore(mfr);
          const readiness=calcReadiness(mfr,findForm.targetMarket);
          const isSel=findSelected===mfr.id;
          const inCmp=compareListIds.includes(mfr.id);
          return `
            <div class="mfr-card" style="border-left-color:${SUS_COLORS[mfr.sustainability]}${isSel?';background:#EFF6FF':''}">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.55rem;flex-wrap:wrap;gap:.4rem">
                <div style="flex:1;min-width:0">
                  <div style="font-size:.92rem;color:var(--navy);font-weight:500">${mfr.name}</div>
                  <div style="font-family:var(--sans);font-size:.68rem;color:var(--muted);margin-top:.1rem">${mfr.city}, ${mfr.country} · ${mfr.type}</div>
                </div>
                <div style="display:flex;gap:.35rem;align-items:center;flex-wrap:wrap;flex-shrink:0">
                  <div style="display:flex;align-items:center;gap:.3rem;padding:.25rem .55rem;background:${SUS_BG[mfr.sustainability]}">
                    <span style="font-family:var(--serif);font-size:1rem;color:${SUS_COLORS[mfr.sustainability]};line-height:1">${score}</span>
                    <div><div style="font-family:var(--mono);font-size:.5rem;color:${SUS_COLORS[mfr.sustainability]};font-weight:700">${mfr.sustainability}</div><div style="font-family:var(--mono);font-size:.45rem;color:var(--muted)">sus.</div></div>
                  </div>
                  ${readiness!==null?`<div style="padding:.25rem .55rem;background:#EFF6FF;border:1px solid #BFDBFE"><div style="font-family:var(--mono);font-size:.5rem;color:var(--blue);font-weight:700">${readiness}% ready</div><div style="font-family:var(--mono);font-size:.45rem;color:var(--muted)">${findForm.targetMarket}</div></div>`:''}
                  <button class="compare-btn${inCmp?' active':''}" onclick="event.stopPropagation();toggleFindCompare(${mfr.id})">${inCmp?'✓ Comparing':'+ Compare'}</button>
                </div>
              </div>
              <div style="font-family:var(--sans);font-size:.75rem;color:#555;line-height:1.65;margin-bottom:.55rem">${mfr.description}</div>
              <div class="chips" style="margin-bottom:.5rem">
                ${mfr.certifications.map(c=>`<span class="tag ${CERT_SCORES[c]>=4?'tag-green':CERT_SCORES[c]>=3?'tag-blue':'tag-gray'}">${c}</span>`).join('')}
                ${mfr.eudrScope?`<span class="tag tag-amber">⚠ EUDR scope</span>`:''}
              </div>
              <div style="display:flex;gap:1.25rem;flex-wrap:wrap;margin-bottom:.5rem">
                ${[['MOQ',mfr.moq.toLocaleString()+' units'],['Lead time',mfr.leadWeeks+' weeks'],['Capacity',mfr.annualCapacity],['Markets',mfr.markets.slice(0,3).join(', ')+(mfr.markets.length>3?' +'+( mfr.markets.length-3):'')]].map(([l,v])=>`<div><div style="font-family:var(--mono);font-size:.52rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">${l}</div><div style="font-family:var(--sans);font-size:.7rem;color:#333">${v}</div></div>`).join('')}
              </div>
              <div style="display:flex;gap:.65rem;align-items:center;flex-wrap:wrap">
                <button class="btn-outline" style="font-size:.58rem;padding:.35rem .7rem" onclick="toggleFindAi(${mfr.id})">${isSel&&findAiCache[mfr.id]?'Hide assessment':findLoadingId===mfr.id?'Loading…':'AI assessment →'}</button>
                <a href="https://${mfr.website}" target="_blank" style="font-family:var(--mono);font-size:.58rem;color:var(--muted);text-decoration:none">↗ ${mfr.website}</a>
                <a href="mailto:${mfr.contact}?subject=${encodeURIComponent('Partnership enquiry — ' + (brand?.name||'Our brand') + ' x ' + mfr.name)}&body=${encodeURIComponent('Dear ' + mfr.name + ' team,\n\nMy name is ' + (brand?.userName||'[Your name]') + ' from ' + (brand?.name||'[Brand name]') + ' (' + (brand?.website||'[website]') + '), a ' + (brand?.category||'consumer brand') + ' based in ' + (brand?.currentMarket||'Sweden') + '.\n\nWe are currently exploring manufacturing partners for our product range and your company came up as a strong fit based on your sustainability credentials and market experience.\n\nWe would love to learn more about:\n- Current MOQ and lead times\n- Certifications and compliance documentation\n- Sampling process and costs\n- Experience with brands entering ' + (brand?.targetMarkets?.[0]||'European') + ' markets\n\nWould you be available for a brief call this week or next?\n\nBest regards,\n' + (brand?.userName||'[Your name]') + '\n' + (brand?.name||'[Brand name]'))}" style="font-family:var(--mono);font-size:.58rem;color:var(--gold);text-decoration:none">✉ Contact</a>
              </div>
              ${isSel?`<div id="ai-panel-${mfr.id}" style="margin-top:.85rem;padding-top:.85rem;border-top:1px solid var(--border)">${renderMfrAiPanel(mfr)}</div>`:''}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function toggleFindCompare(id){
  const i=compareListIds.indexOf(id);
  if(i>=0)compareListIds.splice(i,1);
  else if(compareListIds.length<3)compareListIds.push(id);
  renderFind(document.getElementById('page-find'));
}

async function toggleFindAi(id){
  if(findSelected===id&&findAiCache[id]){findSelected=null;}
  else{
    findSelected=id;
    if(!findAiCache[id]){
      findLoadingId=id;
      renderFind(document.getElementById('page-find'));
      const mfr=MANUFACTURERS.find(m=>m.id===id);
      if(!mfr)return;
      try{
        const text=await callAPI([{role:"user",content:`You are a Nordic brand export consultant. Assess this manufacturer.
Manufacturer: ${mfr.name}, ${mfr.city}, ${mfr.country}
Type: ${mfr.type} | Specialties: ${mfr.specialties.join(', ')}
Certifications: ${mfr.certifications.join(', ')}
MOQ: ${mfr.moq} | Lead time: ${mfr.leadWeeks} weeks | Capacity: ${mfr.annualCapacity}
Brand category: ${findForm.category||brand?.category||'Skincare & Beauty'}
Target market: ${findForm.targetMarket||brand?.targetMarkets?.[0]||'EU'}
Brand sustainability goals: ${brand?.sustainabilityGoals?.join(', ')||'sustainability-focused'}

Write assessment with these EXACT headers on their own line:
SUSTAINABILITY FIT — 2-3 sentences
MARKET READINESS — 2-3 sentences  
WHAT TO ASK FIRST — 3 specific questions
RED FLAGS — concerns or none
VERDICT — one sentence`}]);
        findAiCache[id]=text;
      }catch(e){findAiCache[id]='Could not load assessment.';}
      findLoadingId=null;
    }
  }
  renderFind(document.getElementById('page-find'));
}

function renderMfrAiPanel(mfr){
  if(findLoadingId===mfr.id)return`<div style="text-align:center;padding:1.5rem"><div class="spinner"></div><div style="font-family:var(--mono);font-size:.6rem;color:var(--muted)">Analysing ${mfr.name}…</div></div>`;
  if(!findAiCache[mfr.id])return'';
  const text=findAiCache[mfr.id];
  const sections=["SUSTAINABILITY FIT","MARKET READINESS","WHAT TO ASK FIRST","RED FLAGS","VERDICT"];
  const colors={"SUSTAINABILITY FIT":"#10B981","MARKET READINESS":var_navy,"WHAT TO ASK FIRST":"#C4A882","RED FLAGS":"#EF4444","VERDICT":"#1E3A5F"};
  let html=`<div style="font-family:var(--mono);font-size:.58rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.75rem">★ AI assessment — ${mfr.name}</div>`;
  sections.forEach(s=>{
    const parts=text.split(new RegExp(s+"[^\\n]*\\n","i"));
    const content=parts[1]?.split(/\n[A-Z ]{4,}[—:\-]/)[0]?.trim();
    if(content&&content.length>5){
      html+=`<div class="analysis-section" style="border-left-color:${colors[s]||'#EDE9E1'};margin-bottom:.65rem"><div class="analysis-label" style="color:${colors[s]||'var(--muted)'}">${s}</div><div class="analysis-text">${content}</div></div>`;
    }
  });
  return html;
}


function renderCompareTable(items){
  const rows=[
    {label:"Type",fn:m=>m.type},
    {label:"Sustainability",fn:m=>`<span style="color:${SUS_COLORS[m.sustainability]};font-weight:700">${m.sustainability} (${calcSusScore(m)}/20)</span>`},
    {label:"MOQ",fn:m=>m.moq.toLocaleString()+' units'},
    {label:"Lead time",fn:m=>m.leadWeeks+' weeks'},
    {label:"Capacity",fn:m=>m.annualCapacity},
    {label:"Market readiness",fn:m=>{const r=calcReadiness(m,findForm.targetMarket);return r!==null?`<span style="color:${r>=75?'#10B981':r>=50?'#F59E0B':'#EF4444'};font-weight:700">${r}%${findForm.targetMarket?' ('+findForm.targetMarket+')':''}</span>`:'—';}},
    {label:"Key certifications",fn:m=>m.certifications.slice(0,4).map(c=>`<span class="tag ${CERT_SCORES[c]>=4?'tag-green':'tag-blue'}" style="margin-right:.2rem">${c}</span>`).join('')},
    {label:"EUDR scope",fn:m=>m.eudrScope?`<span style="color:#F59E0B">⚠ Yes</span>`:`<span style="color:#10B981">✓ No</span>`},
    {label:"Specialties",fn:m=>m.specialties.slice(0,3).join(', ')},
  ];

  return `
    <div style="overflow-x:auto;margin-bottom:1.25rem">
      <table class="compare-table">
        <thead>
          <tr>
            <th>ATTRIBUTE</th>
            ${items.map(m=>`<th class="mfr-name">${m.name}<div style="font-family:var(--mono);font-size:.52rem;color:rgba(255,255,255,.4);margin-top:.15rem;font-weight:normal">${m.city}, ${m.country}</div></th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${rows.map(row=>`
            <tr>
              <td class="row-label">${row.label}</td>
              ${items.map(m=>`<td>${row.fn(m)}</td>`).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    ${!compareAiResult&&!compareAiLoading?`
      <button class="btn-primary" style="max-width:400px" onclick="runMfrCompareAi()">Generate AI comparison of ${items.map(m=>m.name).join(' vs ')} →</button>
    `:''}
    ${compareAiLoading?`<div style="text-align:center;padding:2rem"><div class="spinner"></div><div style="font-family:var(--mono);font-size:.6rem;color:var(--muted)">Comparing manufacturers…</div></div>`:''}
    ${compareAiResult?`
      <div class="card">
        <div style="font-family:var(--mono);font-size:.58rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.85rem">★ AI Comparison — ${items.map(m=>m.name).join(' vs ')}</div>
        <div class="prose">${compareAiResult}</div>
        <div style="display:flex;gap:.65rem;margin-top:1rem;flex-wrap:wrap">
          ${items.map(m=>`<a href="mailto:${m.contact}?subject=${encodeURIComponent('Partnership enquiry — ' + (brand?.name||'Our brand') + ' x ' + m.name)}&body=${encodeURIComponent('Dear ' + m.name + ' team,\n\nI am reaching out from ' + (brand?.name||'[Brand name]') + ' regarding a potential manufacturing partnership.\n\nWe would love to learn more about your capabilities, MOQ, and process for onboarding new brands.\n\nBest regards,\n' + (brand?.userName||'[Your name]'))}" style="padding:.45rem .9rem;background:none;border:1px solid var(--border);color:var(--navy);font-family:var(--mono);font-size:.6rem;text-decoration:none">Email ${m.name.split(' ')[0]} →</a>`).join('')}
        </div>
      </div>
    `:''}
    <div style="margin-top:1rem"><button class="btn-outline" onclick="compareMode=false;compareAiResult=null;renderFind(document.getElementById('page-find'))">← Back to list</button></div>
  `;
}

async function runMfrCompareAi(){
  compareAiLoading=true;
  renderFind(document.getElementById('page-find'));
  const items=compareListIds.map(id=>MANUFACTURERS.find(m=>m.id===id)).filter(Boolean);
  const prompt=`Compare these manufacturers for a Nordic brand.
Brand category: ${findForm.category||brand?.category||'Skincare & Beauty'}
Target market: ${findForm.targetMarket||brand?.targetMarkets?.[0]||'EU'}
Brand sustainability goals: ${brand?.sustainabilityGoals?.join(', ')||'sustainability-focused'}

Manufacturers:
${items.map((m,i)=>`${i+1}. ${m.name} (${m.city}, ${m.country}) — ${m.type}
   Certs: ${m.certifications.join(', ')} | MOQ: ${m.moq} | Lead: ${m.leadWeeks}w | Sus: ${m.sustainability}`).join('\n')}

Provide:
WINNER: Which manufacturer wins overall and why (2 sentences)
SUSTAINABILITY: Rank by sustainability fit (2-3 sentences)  
MARKET READINESS: Most ready for ${findForm.targetMarket||'target market'} (2 sentences)
COST & SPEED: Compare MOQ, lead time, value (2 sentences)
RECOMMENDATION: Contact order — first, second, third and why (3 bullets)

Use manufacturer names throughout. Be direct.`;
  try{
    const text=await callAPI([{role:"user",content:prompt}],1200);
    compareAiResult=text;
  }catch(e){compareAiResult='Could not generate comparison.';}
  compareAiLoading=false;
  renderFind(document.getElementById('page-find'));
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
function init(){
  loadState();
  buildNav();
  updateSidebarBrand();
  renderRegStrip();
  showPage('home');
}

init();
</script>
</body>
</html>
