[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

[functions."anthropic-proxy"]
  timeout = 26

[[redirects]]
  from = "/api/anthropic"
  to = "/.netlify/functions/anthropic-proxy"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
