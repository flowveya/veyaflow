[build]
  functions = "netlify/functions"
  publish   = "."

[functions]
  # Use Node.js 20 for all functions
  node_bundler = "esbuild"

# Trigger 8 BIL Use Case A — F2a lock (vision PDF extraction via Anthropic API).
# Harness-measured p95 ~10s on a dense single-page deck; ceiling provides headroom
# for multi-page extractions up to F3.1's 15-page cap. Netlify support enabled a
# 30s function ceiling for this site on 2 Jun 2026 (requested 26; granted 30).
# REQUIRES a redeploy to activate the raised ceiling — committing this value alone
# is not sufficient; the site must be deployed again after the support change.
[functions."anthropic-proxy"]
  timeout = 30

# Redirect /dpp/:dppId to the static DPP viewer HTML
# The viewer JS then calls /.netlify/functions/get-dpp?id=:dppId
[[redirects]]
  from   = "/dpp/*"
  to     = "/dpp/index.html"
  status = 200

# Redirect /brand/:shareId to the static viewer HTML
# The viewer JS then calls the Netlify function with the shareId
[[redirects]]
  from   = "/brand/*"
  to     = "/brand/index.html"
  status = 200

# Friendly 404 page
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[context.production.environment]
  # These are read by Netlify functions — set actual values in Netlify dashboard
  # SUPABASE_URL       = "https://your-project.supabase.co"
  # SUPABASE_SERVICE_KEY = "eyJ..."   (service role — functions/share-brand-pack.js, share-dpp.js)
  # SUPABASE_ANON_KEY    = "eyJ..."   (anon — functions/get-brand-pack.js, get-dpp.js)
